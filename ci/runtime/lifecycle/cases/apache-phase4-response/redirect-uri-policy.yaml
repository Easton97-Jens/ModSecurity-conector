name: apache_phase4_response_redirect_uri_policy
title: Apache Phase-4 redirect target URI policy control
category: apache-phase4-response
portable: false
connector: apache
status: pending
phase: 4
rules: |
  SecRuleEngine On
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/plain
  SecAuditEngine On
  SecAuditLog "@@AUDIT_LOG@@"
