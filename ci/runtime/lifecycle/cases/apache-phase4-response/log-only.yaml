name: apache_phase4_response_log_only
title: Apache Phase-4 log-only multi-brigade control
category: apache-phase4-response
portable: false
connector: apache
status: pending
phase: 4
rules: |
  SecRuleEngine On
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/plain
  SecAuditEngine On
  SecAuditLog "@@AUDIT_LOG@@"
  SecRule RESPONSE_BODY "@contains no-crs-response-body-marker" "id:2190402,phase:4,pass,log,t:none,msg:'Apache Phase-4 log-only response control'"
request:
  method: GET
  path: /apache-phase4/log-only
response:
  body: first-byte-prefixno-crs-response-body-marker
  content_type: text/plain
expect:
  status: 200
  transport: http_status
  intervention: none
  response_contains: no-crs-response-body-marker
