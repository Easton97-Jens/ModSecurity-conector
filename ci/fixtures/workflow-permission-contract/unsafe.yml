name: Unsafe workflow-permission contract fixture

on:
  pull_request_target:

permissions:
  contents: write

jobs:
  privileged-untrusted-execution:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          persist-credentials: true

      - name: Execute untrusted content with a secret
        run: |
          make quick-check
          echo "${{ secrets.EXAMPLE }}"
