# Unselected source/build template for the repository-owned Go middleware.
#
# This is intentionally separate from traefik-forwardauth-dynamic.yaml.  It
# assumes a Traefik local-plugin registration named "modsecurityNative" whose
# module source is staged by an operator under Traefik's local plugin path.
# The repository does not claim that config loading or traffic through this
# alternate path has been verified.
http:
  middlewares:
    modsecurity-native-streaming:
      plugin:
        modsecurityNative:
          maxHeaderCount: 128
          maxHeaderBytes: 65536
          maxRequestChunkBytes: 32768
          maxResponseChunkBytes: 32768
          transactionIDHeader: X-Request-Id
          engineMode: passthrough
