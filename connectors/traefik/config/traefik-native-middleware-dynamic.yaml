# Reference File Provider template for the repository-owned Go middleware.
#
# This is intentionally separate from traefik-forwardauth-dynamic.yaml.  It
# assumes a Traefik local-plugin registration named "modsecurityNative". The
# full-lifecycle-traefik-native target stages the source and materializes an
# equivalent disposable configuration for pinned Traefik. That harness selects
# `engineMode: uds` with a private run-local socket; this checked-in reference
# remains passthrough so it cannot contain a stale or shared runtime path.
http:
  middlewares:
    modsecurity-native-streaming:
      plugin:
        modsecurityNative:
          maxHeaderCount: 128
          maxHeaderBytes: 65536
          maxRequestChunkBytes: 32768
          maxResponseChunkBytes: 32768
          transactionIDHeader: X-Request-Id
          engineMode: passthrough
