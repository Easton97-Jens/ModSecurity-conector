# Reference local-plugin registration for the repository-owned Go middleware.
#
# The full-lifecycle host probe stages the module under a disposable local
# plugin workspace and materializes an equivalent pinned-host configuration.
# This checked-in shape remains separate from forwardAuth and does not provide
# a Common/libmodsecurity bridge or promote any capability.
experimental:
  localPlugins:
    modsecurityNative:
      moduleName: github.com/Easton97-Jens/ModSecurity-conector/connectors/traefik/native_middleware
      settings:
        envs: []
