# Unselected local-plugin registration for the repository-owned Go middleware.
#
# An operator must stage the module under the local plugin workspace expected by
# the installed Traefik release before this static configuration can load it.
# The repository does not run this configuration or claim it is runtime-ready.
experimental:
  localPlugins:
    modsecurityNative:
      moduleName: github.com/Easton97-Jens/ModSecurity-conector/connectors/traefik/native_middleware
      settings:
        envs: []
