# Local host-probe rules for the persistent Traefik UDS engine service.
# These rules are not CRS evidence and are used only to exercise real host
# routing through P1/P2/P3 plus a post-commit P4 log-only boundary.
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain

SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq block" "id:1000001,phase:1,deny,status:403,msg:'native Traefik P1 smoke deny'"
SecRule REQUEST_BODY "@contains no-crs-request-body-marker" "id:1000002,phase:2,deny,status:403,msg:'native Traefik P2 smoke deny'"
SecRule RESPONSE_HEADERS:X-Modsec-Upstream "@streq block" "id:1000003,phase:3,deny,status:403,msg:'native Traefik P3 smoke deny'"
SecRule RESPONSE_BODY "@contains no-crs-response-body-marker" "id:1000004,phase:4,deny,status:403,msg:'native Traefik P4 safe log-only smoke deny'"
