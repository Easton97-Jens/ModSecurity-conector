# Example configuration for the repository-owned Traefik forwardAuth service.
# The connector scripts resolve relative paths from the repository root.
enabled=on
rules_file=common/rules/modsecurity_targeted_smoke.conf
transaction_id_header=x-request-id
# Traefik forwardAuth does not forward the original request body or expose the
# later upstream response, so both body phases are explicitly disabled.
request_body_mode=none
response_body_mode=none
request_body_limit=4096
response_body_limit=4096
phase4_mode=minimal
default_block_status=403
default_error_status=500
event_path=/var/tmp/ModSecurity-conector-verified/logs/traefik-forwardauth-events.jsonl
use_error_log=on
max_header_count=100
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
