# Example configuration for the persistent local Traefik engine service.
# Run the service from the repository root when using this relative rules path,
# or replace rules_file with an absolute trusted local path.
enabled=on
rules_file=common/rules/modsecurity_targeted_smoke.conf
transaction_id_header=x-request-id
request_body_mode=streaming
response_body_mode=streaming
request_body_limit=4096
response_body_limit=4096
body_limit_action=reject
phase4_mode=minimal
default_block_status=403
default_error_status=500
use_error_log=off
max_header_count=100
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
# This source-only example intentionally has no event_path. The selected native
# host harness supplies a private, run-local event_path only when it can send a
# ResponseWriter-confirmed OUTCOME after the actual host action.
