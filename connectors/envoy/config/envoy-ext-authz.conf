# Envoy ext_authz connector example. The launcher replaces the two @...@
# values in a runtime copy; this checked-in file is never rewritten.
enabled=on
rules_file=@RULES_FILE@
transaction_id_header=x-request-id
request_body_mode=buffered
response_body_mode=none
request_body_limit=4096
response_body_limit=4096
phase4_mode=minimal
default_block_status=403
default_error_status=500
event_path=@EVENT_PATH@
use_error_log=on
max_header_count=128
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=32768
max_event_json_bytes=16384
