# Apache smoke-test template.
#
# This file is not used in place. run_apache_smoke.sh renders it into
# BUILD_ROOT before Apache is started.

ServerRoot "@@RUNTIME_ROOT@@"
PidFile "logs/httpd.pid"
Listen 127.0.0.1:@@PORT@@
ServerName 127.0.0.1
DefaultRuntimeDir "run"
ErrorLog "@@LOG_DIR@@/error.log"
LogLevel debug
<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    CustomLog "@@LOG_DIR@@/access.log" common
</IfModule>

Include "@@MODULES_FILE@@"
LoadModule security3_module "@@APACHE_MODULE@@"

DocumentRoot "@@DOCROOT@@"
<Directory "@@DOCROOT@@">
    Require all granted
    FallbackResource /index.html
</Directory>
Include "@@APACHE_BACKEND_PROXY_FILE@@"

<Location "/__modsec_smoke_ready">
    modsecurity off
</Location>

modsecurity on
modsecurity_rules_file "@@RULES_FILE@@"
modsecurity_phase4_mode safe
modsecurity_phase4_log "@@APACHE_PHASE4_LOG@@"
modsecurity_phase4_body_limit 1048576
