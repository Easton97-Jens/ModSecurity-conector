# Common runtime example for the native lighttpd module.
# Replace both absolute example paths before using this file. The native smoke
# harness generates an executable copy with managed absolute paths.
enabled=on
rules_file=/absolute/path/to/common/rules/modsecurity_targeted_smoke.conf
transaction_id_header=x-request-id
request_body_mode=none
response_body_mode=none
request_body_limit=1048576
response_body_limit=1048576
default_block_status=403
default_error_status=500
max_header_count=256
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
event_path=/absolute/path/to/lighttpd-events.jsonl
