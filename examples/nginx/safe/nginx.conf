# Bounded HTTP/1.1 P1--P4 Safe reference for the native NGINX module.
# Replace module, rules, log, listener, and upstream values for the installed
# host before running nginx -t.
load_module modules/ngx_http_modsecurity_module.so;

http {
    # Enables host integration; it is distinct from SecRuleEngine On.
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/modsecurity-phase4.conf;
    # Safe logs post-commit P4 outcomes rather than claiming a late status rewrite.
    modsecurity_phase4_mode safe;
    # Limit P4 scope to reviewed response MIME types.
    modsecurity_phase4_content_types_file /etc/modsecurity/phase4-content-types.conf;
    # This JSONL path contains security metadata and needs safe ownership/rotation.
    modsecurity_phase4_log /var/log/modsecurity/nginx-phase4.jsonl;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log info;

    upstream app_backend {
        server 127.0.0.1:8081;
    }

    server {
        listen 8080;
        server_name example.test;

        # Keep compression disabled until the selected host path has been
        # validated for the response bytes it presents to ModSecurity.
        gzip off;

        location / {
            proxy_pass http://app_backend;
        }
    }
}
