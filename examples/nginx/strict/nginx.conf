# Bounded Phase 4 / RESPONSE_BODY strict-abort example for NGINX.
# This mode can abort an already-started transfer; it is not full buffering parity.

load_module modules/ngx_http_modsecurity_module.so;

http {
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/modsecurity-phase4.conf;
    modsecurity_phase4_mode strict;
    modsecurity_phase4_content_types_file /etc/modsecurity/phase4-content-types.conf;
    modsecurity_phase4_log /var/log/modsecurity/nginx-phase4.jsonl;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log info;

    upstream app_backend {
        server 127.0.0.1:8081;
    }

    server {
        listen 80;
        server_name example.test;

        # Keep compression after ModSecurity until you have verified whether
        # this connector sees compressed or uncompressed bytes in your build.
        gzip off;

        location / {
            proxy_pass http://app_backend;
        }
    }
}
