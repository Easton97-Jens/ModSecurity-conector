# DetectionOnly NGINX reference. The module remains enabled while the rule file
# selects SecRuleEngine DetectionOnly and therefore does not enforce a match.

load_module modules/ngx_http_modsecurity_module.so;

http {
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/modsecurity-detection-only.conf;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    upstream app_backend {
        server 127.0.0.1:8081;
    }

    server {
        listen 80;
        server_name example.test;

        location / {
            proxy_pass http://app_backend;
        }
    }
}
