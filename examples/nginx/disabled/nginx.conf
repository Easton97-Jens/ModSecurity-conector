# Disabled NGINX connector reference. Rules may still load at config time, but
# modsecurity off prevents the NGINX access handler from creating a transaction.

load_module modules/ngx_http_modsecurity_module.so;

http {
    modsecurity off;
    modsecurity_rules_file /etc/modsecurity/modsecurity-request-only.conf;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    upstream app_backend {
        server 127.0.0.1:8081;
    }

    server {
        listen 80;
        server_name example.test;

        location / {
            proxy_pass http://app_backend;
        }
    }
}
