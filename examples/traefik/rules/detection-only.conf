# traefik DetectionOnly ModSecurity rule example.
# The connector remains active; matching the local P4 marker is logged but not
# enforced because SecRuleEngine DetectionOnly suppresses disruptive actions.
SecRuleEngine DetectionOnly
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html application/json
SecResponseBodyLimit 1048576
SecResponseBodyLimitAction ProcessPartial
SecRule RESPONSE_BODY "@contains response-attack" \
    "id:1100401,phase:4,deny,log,status:403"
