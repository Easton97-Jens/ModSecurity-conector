# Minimal dynamic File Provider reference. UDS keeps the native rule path; the
# paired Common Runtime file uses phase4_mode=minimal rather than safe.
http:
  routers:
    app:
      rule: PathPrefix(`/`)
      entryPoints: ["web"]
      middlewares: ["modsecurity-native-minimal"]
      service: "app"
  middlewares:
    modsecurity-native-minimal:
      plugin:
        modsecurityNative:
          maxHeaderCount: 128
          maxHeaderBytes: 65536
          maxRequestChunkBytes: 32768
          maxResponseChunkBytes: 32768
          transactionIDHeader: X-Request-Id
          engineMode: uds
          engineSocketPath: /run/traefik-msconnector/engine.sock
  services:
    app:
      loadBalancer:
        servers:
        - url: http://127.0.0.1:8081
