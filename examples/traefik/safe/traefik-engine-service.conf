# Persistent local engine-service reference for the native Traefik middleware.
# The UDS service loads this reviewed engine policy at startup.
enabled=on
rules_file=/etc/modsecurity/no-crs-baseline.conf
transaction_id_header=x-request-id
# The native middleware supplies bounded chunks in both directions.
request_body_mode=streaming
response_body_mode=streaming
request_body_limit=4096
response_body_limit=4096
body_limit_action=reject
# Go middleware records a post-commit P4 decision as log-only.
phase4_mode=safe
default_block_status=403
default_error_status=500
use_error_log=off
max_header_count=100
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
