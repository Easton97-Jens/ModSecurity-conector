# detection-only Common Runtime profile for the native Traefik UDS engine.
# The native service requires explicit none or streaming body modes; this
# profile preserves the selected streaming full-lifecycle shape.
enabled=on
rules_file=/etc/modsecurity/modsecurity-detection-only.conf
transaction_id_header=x-request-id
request_body_mode=streaming
response_body_mode=streaming
request_body_limit=4096
response_body_limit=4096
body_limit_action=reject
phase4_mode=safe
default_block_status=403
default_error_status=500
use_error_log=off
max_header_count=100
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
