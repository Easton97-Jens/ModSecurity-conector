# Request-only ModSecurity for Apache httpd.
# Include from /etc/apache2/apache2.conf, /etc/httpd/conf/httpd.conf, or a vhost.

# The module must match the installed httpd ABI; this is not a rule-engine switch.
LoadModule security3_module /usr/lib/apache2/modules/mod_security3.so

<IfModule security3_module>
    # Binds ModSecurity transaction processing to this Apache context.
    modsecurity on
    # The worker must be able to read the reviewed engine configuration.
    modsecurity_rules_file /etc/modsecurity/modsecurity-request-only.conf
    modsecurity_use_error_log on
</IfModule>
