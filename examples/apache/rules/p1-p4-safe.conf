SecRuleEngine On

SecRequestBodyAccess On
SecResponseBodyAccess On
# This selects libModSecurity inspection only. Apache retains all response
# MIME types through EOS because the C API cannot expose the effective match.
SecResponseBodyMimeType text/plain text/html application/json application/xml text/xml
SecResponseBodyLimit 1048576
# Engine ProcessPartial does not release an uninspected Apache connector tail:
# the connector's matching 1 MiB gate fails closed before original output.
SecResponseBodyLimitAction ProcessPartial

IncludeOptional /etc/modsecurity/crs/crs-setup.conf
IncludeOptional /etc/modsecurity/crs/rules/*.conf

SecAuditEngine RelevantOnly
SecAuditLogType Serial
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsecurity/apache-audit.log

# Example outbound rule. Replace with production rules or CRS response rules.
SecRule RESPONSE_BODY "@contains response-attack" \
  "id:9002801,phase:4,deny,status:403,log,auditlog,msg:'example outbound response body match'"
