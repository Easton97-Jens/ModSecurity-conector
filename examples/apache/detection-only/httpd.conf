# DetectionOnly Apache reference. The connector remains on; the selected rules
# file sets SecRuleEngine DetectionOnly so matches are logged, not enforced.

LoadModule security3_module /usr/lib/apache2/modules/mod_security3.so

<IfModule security3_module>
    modsecurity on
    modsecurity_rules_file /etc/modsecurity/modsecurity-detection-only.conf
    modsecurity_use_error_log on
</IfModule>
