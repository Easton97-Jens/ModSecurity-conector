# Bounded Phase 4 / RESPONSE_BODY example for Apache httpd.
# Apache buffers small responses before commit where possible; committed
# responses can still become strict-abort evidence rather than clean 403.

LoadModule security3_module /usr/lib/apache2/modules/mod_security3.so

<IfModule security3_module>
    modsecurity on
    modsecurity_rules_file /etc/modsecurity/modsecurity-phase4.conf
    modsecurity_use_error_log on
    modsecurity_phase4_mode safe
    modsecurity_phase4_content_types_file /etc/modsecurity/phase4-content-types.conf
    modsecurity_phase4_log /var/log/modsecurity/apache-phase4.jsonl
    modsecurity_phase4_body_limit 1048576
</IfModule>

CustomLog /var/log/apache2/access.log combined
ErrorLog /var/log/apache2/error.log
