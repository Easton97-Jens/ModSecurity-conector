# Native HTX filter reference with the parser-supported minimal P4 mode.
# The filter is available only in the patched HAProxy host built by this
# repository; stock HAProxy does not gain it from this configuration alone.
global
    log stdout format raw local0

defaults
    mode http
    timeout connect 2s
    timeout client 5s
    timeout server 5s

frontend htx_in
    bind 127.0.0.1:8080
    # Native HTX filter; the rules file must be readable by the patched host.
    filter modsecurity-htx rules-file /etc/modsecurity/no-crs-baseline.conf phase4-mode minimal
    default_backend htx_upstream

backend htx_upstream
    server upstream 127.0.0.1:8081
