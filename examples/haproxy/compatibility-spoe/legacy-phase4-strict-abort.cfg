# LEGACY / DISABLED: this file is retained only to document the retired
# response-body sampling design. The selected SPOE/SPOP path has no response
# body route and Phase 4 is not implemented. It intentionally has no active
# response-body wait directive, and spoe-modsecurity.conf is header-only.
global
    log stdout format raw local0
    tune.bufsize 65536

defaults
    mode http
    timeout connect 1s
    timeout client 5s
    timeout server 5s

frontend fe_modsecurity
    bind 127.0.0.1:8080
    unique-id-format %[uuid()]
    unique-id-header X-Request-ID
    option http-buffer-request
    filter spoe engine modsecurity config /etc/haproxy/spoe-modsecurity.conf
    http-request send-spoe-group modsecurity request-check
    http-request deny status 403 if { var(txn.modsec.blocked) -m bool }
    http-response send-spoe-group modsecurity response-check
    http-response silent-drop if { var(txn.modsec.action) -m str drop }
    http-response deny status 403 if { var(txn.modsec.blocked) -m bool }
    http-response deny status 503 if { var(txn.modsec.status) -m int 503 }
    default_backend be_app

backend be_app
    server app1 127.0.0.1:8081

backend be_spoa_modsecurity
    mode spop
    timeout connect 1s
    timeout server 3s
    server spoa1 127.0.0.1:12345
