# HAProxy ModSecurity SPOA agent config.
# CLI flags with the same names override these values.
listen=127.0.0.1:12345
rules-file=/etc/modsecurity/haproxy-rules.conf
decision-log=/var/log/haproxy-modsecurity/decision.jsonl
audit-log=/var/log/haproxy-modsecurity/audit.log
log-file=/var/log/haproxy-modsecurity/agent.log
mode=block
fail-mode=closed
request-body-limit=65532
response-body-limit=0
response-body-timeout=0
spoe-timeout=2000
worker-count=1
max-transactions=4096
