# Native HTX DetectionOnly reference. The filter stays active and the installed
# rule file selects SecRuleEngine DetectionOnly; stock HAProxy does not gain it
# from this configuration alone.
global
    log stdout format raw local0

defaults
    mode http
    timeout connect 2s
    timeout client 5s
    timeout server 5s

frontend htx_in
    bind 127.0.0.1:8080
    filter modsecurity-htx rules-file /etc/modsecurity/modsecurity-detection-only.conf phase4-mode minimal
    default_backend htx_upstream

backend htx_upstream
    server upstream 127.0.0.1:8081
