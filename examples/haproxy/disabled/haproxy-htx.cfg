# Disabled native HTX reference. Omitting the filter is the native connector
# switch; SecRuleEngine cannot receive traffic when no filter is declared.
global
    log stdout format raw local0

defaults
    mode http
    timeout connect 2s
    timeout client 5s
    timeout server 5s

frontend htx_in
    bind 127.0.0.1:8080
    # No filter modsecurity-htx declaration: connector processing is disabled.
    default_backend htx_upstream

backend htx_upstream
    server upstream 127.0.0.1:8081
