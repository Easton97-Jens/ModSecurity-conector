# DetectionOnly stock-lighttpd runtime profile.
# Stock lighttpd exposes headers only, so both body modes remain none while the
# local rule file records matching behavior without disruptive enforcement.
enabled=on
rules_file=/etc/modsecurity/modsecurity-detection-only.conf
transaction_id_header=x-modsec-transaction-id
request_body_mode=none
response_body_mode=none
request_body_limit=1048576
response_body_limit=1048576
phase4_mode=minimal
default_block_status=403
default_error_status=500
use_error_log=off
max_header_count=256
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
event_path=/var/log/lighttpd/msconnector-events.jsonl
