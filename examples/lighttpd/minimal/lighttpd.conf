# Stock native lighttpd-module reference. The stock host supports header
# processing only; keep both body modes none in the matching runtime file.
server.compat-module-load = "disable"
server.modules = ( "mod_msconnector" )
server.document-root = "/srv/lighttpd/htdocs"
server.bind = "127.0.0.1"
server.port = 8080
server.errorlog = "/var/log/lighttpd/error.log"
server.pid-file = "/run/lighttpd/lighttpd.pid"
server.upload-dirs = ( "/var/tmp/lighttpd-upload" )
# Enables the plugin; this is distinct from SecRuleEngine in the runtime rules.
msconnector.enabled = "enable"
# Read at startup and rejected when missing or invalid.
msconnector.config-file = "/etc/lighttpd/msconnector-runtime.conf"
