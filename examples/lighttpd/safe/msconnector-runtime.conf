# Patched lighttpd uses this Common Runtime profile for the selected native path.
enabled=on
rules_file=/etc/modsecurity/no-crs-baseline.conf
transaction_id_header=x-modsec-transaction-id
# Streaming is limited to the matched HTTP/1.1 identity-entity host contract.
request_body_mode=streaming
response_body_mode=streaming
request_body_limit=1048576
response_body_limit=1048576
body_limit_action=reject
# Safe records late post-commit P4 outcomes without fabricating a status change.
phase4_mode=safe
default_block_status=403
default_error_status=500
max_header_count=256
max_header_name_size=256
max_header_value_size=8192
max_total_header_bytes=65536
max_event_json_bytes=16384
# Metadata-only event log: grant only the service account write access.
event_path=/var/log/lighttpd/msconnector-events.jsonl
