# Example only. This does not prove production readiness.
# This compatibility file does not load mod_msconnector. Native module examples
# are documented separately under ../minimal and ../safe.
server.modules = ( "mod_accesslog", "mod_proxy" )
server.document-root = "/var/empty"
server.port = 8080
server.errorlog = "./lighttpd-error.log"
accesslog.filename = "./lighttpd-access.log"

# Illustrative frontend proxy. A ModSecurity sidecar/proxy or decision service
# must be deployed separately in front of, beside, or behind this route according
# to the operator's architecture.
$HTTP["host"] =~ ".*" {
  proxy.server = ( "" => ( ( "host" => "127.0.0.1", "port" => 8081 ) ) )
}
