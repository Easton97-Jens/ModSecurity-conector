name: versioned python before setup

on:
  workflow_dispatch:

jobs:
  fixture-job:
    runs-on: ubuntu-latest
    steps:
      - name: Use a versioned interpreter too soon
        run: /opt/hostedtoolcache/Python/3.13.14/x64/bin/python3.13 -c 'print("unsafe")'
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Use Python
        run: python3 -c 'print("later")'
