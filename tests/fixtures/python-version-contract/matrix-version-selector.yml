name: matrix-derived Python version selector

on:
  workflow_dispatch:

jobs:
  fixture-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['3.13.14']
    steps:
      - id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.version }}
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Use shell only after verification
        run: echo "matrix selection is prohibited"
