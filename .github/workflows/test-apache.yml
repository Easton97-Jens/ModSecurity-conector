name: test-apache

on:
  push:
  pull_request:

jobs:
  apache-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache scaffold
        run: |
          set -eu
          test -f connectors/apache/README.md
          test -f connectors/apache/TODO.md
          test -f connectors/apache/docs/architecture.md
          test -f connectors/apache/docs/build.md
          test -f connectors/apache/docs/public-sources.md
          test -f connectors/apache/harness/README.md
          test -f connectors/apache/harness/apache_smoke.conf
          test -f connectors/apache/harness/run_apache_smoke.sh
          test -f ci/prepare-apache-build.sh
          test -f ci/run-apache-smoke.sh
          test -f tests/apache/apache-regression-map.md
          test -f tests/apache/cases/imported/README.md
          test -f docs/testing/test-import-plan.md
          test -f tests/common/cases/minimal/phase2_args_block.yaml
          test -f tests/common/cases/imported/action_deny_phase1.yaml
          test -f tests/common/cases/imported/multipart_basic_block.yaml
          test -f tests/import-status.json
          test -f docs/connectors/real-world-connector-validation.md
          grep -q 'Status:' connectors/apache/TODO.md
      - name: Shell syntax
        run: |
          set -eu
          sh -n ci/prepare-apache-build.sh
          sh -n ci/run-apache-smoke.sh
          sh -n connectors/apache/harness/run_apache_smoke.sh
