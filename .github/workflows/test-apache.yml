name: test-apache

on:
  push:
  pull_request:

jobs:
  apache-structure:
    runs-on: ubuntu-latest
    env:
      MODSECURITY_V3_SOURCE_DIR: ${{ github.workspace }}/ModSecurity_V3
      MODSECURITY_APACHE_SOURCE_DIR: ${{ github.workspace }}/ModSecurity-apache
      BUILD_ROOT: ${{ runner.temp }}/ModSecurity-conector-build
      BUILD_HTTPD_FROM_SOURCE: "1"
      BUILD_PCRE2_FROM_SOURCE: "1"
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/python-pycache
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache scaffold
        run: |
          set -eu
          test -f connectors/apache/README.md
          test -f connectors/apache/TODO.md
          test -f connectors/apache/docs/architecture.md
          test -f connectors/apache/docs/build.md
          test -f connectors/apache/docs/public-sources.md
          test -f connectors/apache/harness/README.md
          test -f connectors/apache/harness/apache_smoke.conf
          test -f connectors/apache/harness/run_apache_smoke.sh
          test -f ci/prepare-apache-build.sh
          test -f ci/run-apache-smoke.sh
          test -f tests/apache/apache-regression-map.md
          test -f tests/apache/cases/imported/README.md
          test -f docs/test-import-plan.md
          test -f tests/common/cases/minimal/phase2_args_block.yaml
          test -f tests/common/cases/imported/action_deny_phase1.yaml
          grep -q 'Status:' connectors/apache/TODO.md
      - name: Shell syntax
        run: |
          set -eu
          sh -n ci/prepare-apache-build.sh
          sh -n ci/run-apache-smoke.sh
          sh -n connectors/apache/harness/run_apache_smoke.sh
      - name: Apache connector smoke or blocked
        run: |
          set +e
          REFRESH=1 sh ci/run-apache-smoke.sh
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "::notice::Apache connector smoke blocked; sources or build prerequisites are absent."
            exit 0
          fi
          exit "$rc"
      - name: Upload Apache smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apache-smoke-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/ModSecurity-conector-build/logs
            ${{ runner.temp }}/ModSecurity-conector-build/results
            ${{ runner.temp }}/ModSecurity-conector-build/apache-runtime/*/conf
