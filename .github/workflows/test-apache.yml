name: test-apache

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  apache-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'
      - name: Initialize runner temp paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$verified_root/build"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
          } >> "$GITHUB_ENV"
      - name: Check Apache scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          test -f connectors/apache/README.md
          test -f connectors/apache/TODO.md
          test -f connectors/apache/docs/architecture.md
          test -f connectors/apache/docs/build.md
          test -f connectors/apache/docs/public-sources.md
          test -f connectors/apache/harness/README.md
          test -f connectors/apache/harness/apache_smoke.conf
          test -f connectors/apache/harness/run_apache_smoke.sh
          test ! -d connectors/apache/tests
          test -f modules/ModSecurity-test-Framework/docs/testing/imports/apache-regression-map.md
          test -f config/testing/import-status.json
          test -f reports/testing/real-world-connector-validation.md
          grep -q 'Status:' connectors/apache/TODO.md
      - name: Syntax and dry-run checks
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          sh -n connectors/apache/harness/run_apache_smoke.sh
          make -n smoke-apache
          make quick-check
