name: cloud-quick-smoke

on:
  push:
  pull_request:

jobs:
  cloud-quick-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect Lua dev package
        id: lua
        shell: bash
        run: |
          set -euo pipefail
          for pkg in liblua5.4-dev liblua5.3-dev liblua5.2-dev liblua5.1-0-dev liblua-dev; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              echo "lua_pkg=$pkg" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "lua_pkg=liblua5.4-dev" >> "$GITHUB_OUTPUT"

      - name: Install cloud quick smoke dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential libtool pkg-config cppcheck \
            libyajl-dev libcurl4-openssl-dev liblmdb-dev \
            libmaxminddb-dev libpcre2-dev libxml2-dev libfuzzy-dev \
            pcre2-utils libpcre3-dev bison flex \
            libjson-c-dev libjansson-dev libcjson-dev libjsoncpp-dev \
            rapidjson-dev nlohmann-json3-dev libsimdjson-dev \
            afl++ apache2 apache2-dev nginx libmodsecurity-dev \
            "${{ steps.lua.outputs.lua_pkg }}"

      - name: Cache venv and fetched sources
        uses: actions/cache@v4
        with:
          path: |
            .venv
            /src/ModSecurity-conector-build/sources
          key: cloud-quick-${{ runner.os }}-${{ hashFiles('requirements-dev.txt', 'Makefile', 'ci/*.sh', 'ci/*.py') }}

      - name: Cloud quick checks (framework strict, runtime probes blockable)
        run: make cloud-quick-check
