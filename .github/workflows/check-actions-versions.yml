name: check-actions-versions

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: read

jobs:
  check-actions-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"

      - name: Check GitHub Actions versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check-github-actions-versions.py --report actions-update-report.md

      - name: Write report summary
        if: always()
        run: |
          if [ -f actions-update-report.md ]; then
            cat actions-update-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
