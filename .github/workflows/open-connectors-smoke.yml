name: Open Connector Runtime Smokes

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  open-connectors-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TMPDIR: /tmp
      ALLOW_RUNTIME_DOWNLOADS: "1"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Initialize runtime paths
        run: |
          set -eu
          verified_root="/tmp/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=/tmp/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$verified_root/build"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
            echo "PYTHONPYCACHEPREFIX=/tmp/python-pycache"
            echo "RUNTIME_REPORT_OUTPUT_ROOT=$GITHUB_WORKSPACE/ci-artifacts/open-connectors/runtime-cache-reports"
          } >> "$GITHUB_ENV"
          mkdir -p ci-artifacts/open-connectors/final-checks

      - name: Install local Python dependencies
        run: |
          set -eu
          make setup-dev

      - name: Common helper checks
        run: |
          set -eu
          TMPDIR=/tmp make check-common-helpers

      - name: Prepare shared runtime components
        run: |
          set -eu
          TMPDIR=/tmp ALLOW_RUNTIME_DOWNLOADS=1 ALLOW_RUNTIME_BUILDS=1 make prepare-runtime-components

      - name: Prepare Envoy runtime component
        run: |
          set -eu
          TMPDIR=/tmp ALLOW_RUNTIME_DOWNLOADS=1 make prepare-envoy-runtime

      - name: Prepare Traefik runtime component
        run: |
          set -eu
          TMPDIR=/tmp ALLOW_RUNTIME_DOWNLOADS=1 make prepare-traefik-runtime

      - name: Build Lighttpd runtime component
        run: |
          set -eu
          TMPDIR=/tmp ALLOW_RUNTIME_DOWNLOADS=1 ALLOW_RUNTIME_BUILDS=1 make prepare-lighttpd-runtime-build

      - name: Workspace status after prepare
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          git status --short | tee ci-artifacts/open-connectors/final-checks/git-status-after-prepare.txt

      - name: Runtime component inventory
        run: |
          set -euo pipefail
          TMPDIR=/tmp make runtime-components-inventory | tee ci-artifacts/open-connectors/runtime-components-inventory.txt
          TMPDIR=/tmp make runtime-components-sources | tee ci-artifacts/open-connectors/runtime-components-sources.txt

      - name: Simple runtime smokes
        run: |
          set -eu
          TMPDIR=/tmp make smoke-envoy
          TMPDIR=/tmp make smoke-traefik
          TMPDIR=/tmp make smoke-lighttpd

      - name: Workspace status after simple smokes
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          git status --short | tee ci-artifacts/open-connectors/final-checks/git-status-after-simple-smokes.txt

      - name: Targeted ModSecurity smokes
        run: |
          set -eu
          TMPDIR=/tmp make smoke-envoy-modsecurity
          TMPDIR=/tmp make smoke-traefik-modsecurity
          TMPDIR=/tmp make smoke-lighttpd-modsecurity

      - name: Request Body smokes
        run: |
          set -eu
          TMPDIR=/tmp make smoke-open-connectors-request-body

      - name: Minimal CRS smokes
        run: |
          set -eu
          TMPDIR=/tmp make smoke-open-connectors-crs

      - name: Secondary CRS smokes
        run: |
          set -eu
          TMPDIR=/tmp make smoke-open-connectors-crs-secondary

      - name: Workspace status after CRS smokes
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          git status --short | tee ci-artifacts/open-connectors/final-checks/git-status-after-crs-smokes.txt

      - name: Final check - git status before
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          git status --short | tee ci-artifacts/open-connectors/final-checks/git-status-before.txt
          git diff --name-only | tee ci-artifacts/open-connectors/final-checks/git-diff-name-only-before.txt
          git diff --stat | tee ci-artifacts/open-connectors/final-checks/git-diff-stat-before.txt

      - name: Final check - lint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/open-connectors/final-checks
          if TMPDIR=/tmp make lint 2>&1 | tee ci-artifacts/open-connectors/final-checks/lint.log; then
            printf 'pass\n' > ci-artifacts/open-connectors/final-checks/lint.status
          else
            rc=$?
            printf 'failed\n' > ci-artifacts/open-connectors/final-checks/lint.status
            echo "----- lint.log tail -----"
            tail -n 200 ci-artifacts/open-connectors/final-checks/lint.log || true
            exit "$rc"
          fi

      - name: Final check - quick-check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/open-connectors/final-checks
          if TMPDIR=/tmp make quick-check 2>&1 | tee ci-artifacts/open-connectors/final-checks/quick-check.log; then
            printf 'pass\n' > ci-artifacts/open-connectors/final-checks/quick-check.status
          else
            rc=$?
            printf 'failed\n' > ci-artifacts/open-connectors/final-checks/quick-check.status
            echo "----- quick-check.log tail -----"
            tail -n 200 ci-artifacts/open-connectors/final-checks/quick-check.log || true
            exit "$rc"
          fi

      - name: Final check - git diff check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/open-connectors/final-checks
          if git diff --check 2>&1 | tee ci-artifacts/open-connectors/final-checks/git-diff-check.log; then
            printf 'pass\n' > ci-artifacts/open-connectors/final-checks/git-diff-check.status
          else
            rc=$?
            printf 'failed\n' > ci-artifacts/open-connectors/final-checks/git-diff-check.status
            echo "----- git-diff-check.log tail -----"
            tail -n 200 ci-artifacts/open-connectors/final-checks/git-diff-check.log || true
            exit "$rc"
          fi

      - name: Final check - git status after
        if: always()
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          git status --short | tee ci-artifacts/open-connectors/final-checks/git-status-after.txt
          git diff --name-only | tee ci-artifacts/open-connectors/final-checks/git-diff-name-only-after.txt
          git diff --stat | tee ci-artifacts/open-connectors/final-checks/git-diff-stat-after.txt

      - name: Ensure final check diagnostics directory
        if: always()
        run: |
          set -eu
          mkdir -p ci-artifacts/open-connectors/final-checks
          if [ ! -f ci-artifacts/open-connectors/final-checks/lint.log ]; then
            printf 'not run; see workflow steps.\n' > ci-artifacts/open-connectors/final-checks/lint.log
            printf 'skipped\n' > ci-artifacts/open-connectors/final-checks/lint.status
          fi
          if [ ! -f ci-artifacts/open-connectors/final-checks/quick-check.log ]; then
            printf 'skipped because an earlier final check failed.\n' > ci-artifacts/open-connectors/final-checks/quick-check.log
            printf 'skipped\n' > ci-artifacts/open-connectors/final-checks/quick-check.status
          fi
          if [ ! -f ci-artifacts/open-connectors/final-checks/git-diff-check.log ]; then
            printf 'skipped because an earlier final check failed.\n' > ci-artifacts/open-connectors/final-checks/git-diff-check.log
            printf 'skipped\n' > ci-artifacts/open-connectors/final-checks/git-diff-check.status
          fi

      - name: Upload final check diagnostics
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: open-connectors-final-checks
          retention-days: 1
          if-no-files-found: warn
          path: |
            ci-artifacts/open-connectors/final-checks/lint.log
            ci-artifacts/open-connectors/final-checks/quick-check.log
            ci-artifacts/open-connectors/final-checks/git-diff-check.log
            ci-artifacts/open-connectors/final-checks/git-status-before.txt
            ci-artifacts/open-connectors/final-checks/git-status-after.txt
            ci-artifacts/open-connectors/final-checks/git-diff-name-only-before.txt
            ci-artifacts/open-connectors/final-checks/git-diff-name-only-after.txt
            ci-artifacts/open-connectors/final-checks/git-diff-stat-before.txt
            ci-artifacts/open-connectors/final-checks/git-diff-stat-after.txt

      - name: Capture runtime component reports
        if: always()
        run: |
          set -u
          mkdir -p ci-artifacts/open-connectors
          TMPDIR=/tmp make runtime-components-inventory > ci-artifacts/open-connectors/runtime-components-inventory.txt 2>&1 || true
          TMPDIR=/tmp make runtime-components-sources > ci-artifacts/open-connectors/runtime-components-sources.txt 2>&1 || true

      - name: Collect smoke evidence
        if: always()
        run: |
          set -eu
          artifact_root="ci-artifacts/open-connectors"
          mkdir -p "$artifact_root"
          if [ -d /tmp/ModSecurity-conector-verified ]; then
            rm -rf "$artifact_root/verified-root"
            mkdir -p "$artifact_root/verified-root"
            cp -a /tmp/ModSecurity-conector-verified/. "$artifact_root/verified-root/"
          else
            printf 'No /tmp/ModSecurity-conector-verified directory was produced.\n' > "$artifact_root/README.txt"
          fi

      - name: Cleanup artifacts before upload
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          ARTIFACT_NAME: open-connectors-smoke-evidence
        with:
          script: |
            const { owner, repo } = context.repo;
            const targetName = process.env.ARTIFACT_NAME;
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            for (const artifact of artifacts) {
              if (artifact.name !== targetName) {
                continue;
              }
              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted previous artifact ${artifact.name} (${artifact.id}).`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                core.warning(`Could not delete previous artifact ${artifact.name} (${artifact.id}): ${message}`);
              }
            }

      - name: Upload open connector smoke evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: open-connectors-smoke-evidence
          retention-days: 1
          if-no-files-found: warn
          path: ci-artifacts/open-connectors/

      - name: Write GitHub step summary
        if: always()
        run: |
          set -eu
          if [ -z "${GITHUB_STEP_SUMMARY:-}" ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          root = Path("/tmp/ModSecurity-conector-verified")

          def load(path):
              if not path.is_file():
                  return None
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  return None

          def status(connector, filename):
              data = load(root / f"{connector}-smoke" / filename)
              if not data:
                  return "missing"
              base = str(data.get("status") or "unknown")
              allowed = data.get("allowed_request_status")
              blocked = data.get("blocked_request_status")
              if allowed is not None and blocked is not None:
                  return f"{base} ({allowed}/{blocked})"
              return base

          def lighttpd_build_status():
              binary = root / "component-cache/lighttpd/bin/lighttpd"
              return "PASS" if binary.is_file() and os.access(binary, os.X_OK) else "missing"

          final_checks = Path("ci-artifacts/open-connectors/final-checks")

          def final_check_status(name):
              marker = final_checks / f"{name}.status"
              if marker.is_file():
                  value = marker.read_text(encoding="utf-8").strip()
                  return value or "unknown"
              log_name = f"{name}.log"
              if (final_checks / log_name).is_file():
                  return "unknown"
              return "skipped"

          rows = [
              (
                  "Envoy",
                  "n/a",
                  status("envoy", "runtime-result.json"),
                  status("envoy", "targeted-result.json"),
                  status("envoy", "request-body-result.json"),
                  status("envoy", "crs-result.json"),
                  status("envoy", "crs-secondary-result.json"),
              ),
              (
                  "Traefik",
                  "n/a",
                  status("traefik", "runtime-result.json"),
                  status("traefik", "targeted-result.json"),
                  status("traefik", "request-body-result.json"),
                  status("traefik", "crs-result.json"),
                  status("traefik", "crs-secondary-result.json"),
              ),
              (
                  "Lighttpd",
                  lighttpd_build_status(),
                  status("lighttpd", "runtime-result.json"),
                  status("lighttpd", "targeted-result.json"),
                  status("lighttpd", "request-body-result.json"),
                  status("lighttpd", "crs-result.json"),
                  status("lighttpd", "crs-secondary-result.json"),
              ),
          ]

          lines = [
              "# Open Connector Runtime Smokes",
              "",
              "| Connector | Build | Simple | Targeted ModSecurity | Request Body | Minimal CRS | Secondary CRS |",
              "| --- | --- | --- | --- | --- | --- | --- |",
          ]
          for row in rows:
              lines.append("| " + " | ".join(row) + " |")
          lines.extend(
              [
                  "",
                  "Artifact path: `ci-artifacts/open-connectors/`.",
                  "Artifact name: `open-connectors-smoke-evidence`.",
                  "",
                  "Forbidden claims remain forbidden:",
                  "",
                  "- `production_ready=true`",
                  "- `full_matrix_ready=true`",
                  "- `crs_complete=true`",
                  "- `response_body_verified=true`",
                  "",
                  "## Final Checks",
                  "",
                  "| Check | Status | Log |",
                  "| --- | --- | --- |",
                  f"| lint | {final_check_status('lint')} | `final-checks/lint.log` |",
                  f"| quick-check | {final_check_status('quick-check')} | `final-checks/quick-check.log` |",
                  f"| git diff --check | {final_check_status('git-diff-check')} | `final-checks/git-diff-check.log` |",
                  "",
                  "Final check diagnostics artifact: `open-connectors-final-checks`.",
                  "",
              ]
          )
          summary_path.write_text("\n".join(lines), encoding="utf-8")
          PY
