name: test-lighttpd

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lighttpd-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Check lighttpd Common and host contracts
        run: |
          set -eu
          make check-lighttpd-common-adoption
          make check-remaining-connectors-host-integration
          make check-remaining-connectors-build-wiring
          make check-remaining-connectors-start-wiring
          make check-remaining-connectors-claim-policy
