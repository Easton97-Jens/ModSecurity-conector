name: test-lighttpd

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lighttpd-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Check Lighttpd scaffold
        run: |
          set -eu
          test -f connectors/lighttpd/README.md
          test -f connectors/lighttpd/TODO.md
          test -f connectors/lighttpd/docs/architecture.md
          test -f connectors/lighttpd/docs/build.md
          test -f connectors/lighttpd/docs/public-sources.md
          grep -q 'Status:' connectors/lighttpd/TODO.md
