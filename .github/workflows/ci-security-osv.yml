name: OSV dependency scanning

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: "7 2 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pull-request-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    # Mirrors the stable v2.3.8 PR scan/reporter path without exporting full
    # JSON outputs, which exceed GitHub's job-output limit in this repository.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false
      - name: Checkout target revision
        env:
          OSV_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git checkout --detach "$OSV_BASE_SHA"
      - name: Scan target revision
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            -r
            ./
      - name: Checkout pull-request revision
        env:
          OSV_HEAD_SHA: ${{ github.sha }}
        run: git checkout --detach "$OSV_HEAD_SHA"
      - name: Scan pull-request revision
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            -r
            ./
      - name: Compare OSV results
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=true
      - name: Upload OSV SARIF artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: OSV Scanner SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload target JSON results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: old-json-results
          path: old-results.json
          retention-days: 5
      - name: Upload pull-request JSON results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: new-json-results
          path: new-results.json
          retention-days: 5
      - name: Upload OSV SARIF to code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
  scheduled-full:
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        ./
      results-file-name: results.sarif
      upload-sarif: true
      fail-on-vuln: true
      checkout-submodules: false
