name: manual-heavy-runtime-validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manual-heavy-runtime-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        variant:
          - no-crs
          - with-crs
    env:
      MODSECURITY_REPO_URL: https://github.com/owasp-modsecurity/ModSecurity.git
      MODSECURITY_GIT_REF: v3/master
      BUILD_HTTPD_FROM_SOURCE: "1"
      BUILD_PCRE2_FROM_SOURCE: "1"
      BUILD_NGINX_FROM_SOURCE: "1"
      NGINX_SOURCE_MODE: github-release
      NGINX_SOURCE_REPO_URL: https://github.com/nginx/nginx
      NGINX_RELEASE_TAG: latest
      SMOKE_PREPARE_TIMEOUT_SECONDS: "3600"
      SMOKE_LOCK_MODE: wait
      SMOKE_LOCK_TIMEOUT_SECONDS: "1800"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Initialize paths
        id: paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          build_root="$verified_root/build"
          build_root_apache="$verified_root/apache-build"
          source_root="$verified_root/src"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$source_root"
            echo "BUILD_ROOT=$build_root"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
            echo "MODSECURITY_SOURCE_DIR=$source_root/ModSecurity_V3"
            echo "MODSECURITY_V3_SOURCE_DIR=$source_root/ModSecurity_V3"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"
          echo "verified_root=$verified_root" >> "$GITHUB_OUTPUT"
          echo "build_root=$build_root" >> "$GITHUB_OUTPUT"
          echo "build_root_apache=$build_root_apache" >> "$GITHUB_OUTPUT"
          echo "source_root=$source_root" >> "$GITHUB_OUTPUT"

      - name: Lint and py-compile
        run: |
          make setup-dev
          make lint
          .venv/bin/python -P -m py_compile modules/ModSecurity-test-Framework/tests/normalizers/*.py modules/ModSecurity-test-Framework/tests/runners/*.py modules/ModSecurity-test-Framework/ci/*.py
          git diff --check

      - name: Sequential full smoke
        run: |
          set -eu
          make fetch-deps
          case "${{ matrix.variant }}" in
            no-crs)
              SMOKE_PREPARE_TIMEOUT_SECONDS=3600 REFRESH=1 make test-no-crs
              ;;
            with-crs)
              SMOKE_PREPARE_TIMEOUT_SECONDS=3600 REFRESH=1 make test-with-crs
              ;;
            *)
              echo "unknown test variant: ${{ matrix.variant }}" >&2
              exit 1
              ;;
          esac

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-smoke-sequential-${{ matrix.variant }}-artifacts
          if-no-files-found: ignore
          path: |
            ${{ steps.paths.outputs.build_root_apache }}/logs
            ${{ steps.paths.outputs.build_root_apache }}/results
            ${{ steps.paths.outputs.build_root }}/logs
            ${{ steps.paths.outputs.build_root }}/results
