name: manual-heavy-runtime-validation

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  manual-heavy-runtime-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        variant:
          - no-crs
          - with-crs
    env:
      MODSECURITY_REPO_URL: https://github.com/owasp-modsecurity/ModSecurity.git
      MODSECURITY_GIT_REF: v3/master
      BUILD_HTTPD_FROM_SOURCE: "1"
      BUILD_PCRE2_FROM_SOURCE: "1"
      BUILD_NGINX_FROM_SOURCE: "1"
      NGINX_SOURCE_MODE: github-release
      NGINX_SOURCE_REPO_URL: https://github.com/nginx/nginx
      NGINX_RELEASE_TAG: latest
      SMOKE_PREPARE_TIMEOUT_SECONDS: "3600"
      SMOKE_LOCK_MODE: wait
      SMOKE_LOCK_TIMEOUT_SECONDS: "1800"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Initialize paths
        id: paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          build_root="$verified_root/build"
          build_root_apache="$verified_root/apache-build"
          source_root="$verified_root/src"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$source_root"
            echo "BUILD_ROOT=$build_root"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
            echo "MODSECURITY_SOURCE_DIR=$source_root/ModSecurity_V3"
            echo "MODSECURITY_V3_SOURCE_DIR=$source_root/ModSecurity_V3"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"
          {
            echo "verified_root=$verified_root"
            echo "build_root=$build_root"
            echo "build_root_apache=$build_root_apache"
            echo "source_root=$source_root"
          } >> "$GITHUB_OUTPUT"

      - name: Lint and py-compile
        run: |
          make setup-dev
          make lint
          find modules/ModSecurity-test-Framework/tests/normalizers modules/ModSecurity-test-Framework/tests/runners modules/ModSecurity-test-Framework/ci -type f -name '*.py' -print0 | xargs -0 -r .venv/bin/python -P -m py_compile
          git diff --check

      - name: Sequential full smoke
        run: |
          set -eu
          make fetch-deps
          case "${{ matrix.variant }}" in
            no-crs)
              SMOKE_PREPARE_TIMEOUT_SECONDS=3600 REFRESH=1 make test-no-crs
              ;;
            with-crs)
              SMOKE_PREPARE_TIMEOUT_SECONDS=3600 REFRESH=1 make test-with-crs
              ;;
            *)
              echo "unknown test variant: ${{ matrix.variant }}" >&2
              exit 1
              ;;
          esac

      - name: Cleanup artifacts before upload
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ARTIFACT_NAME: full-smoke-sequential-${{ matrix.variant }}-artifacts
        with:
          script: |
            const GLOBAL_KEEP_LIMIT = 20;
            const PRE_UPLOAD_KEEP_LIMIT = Math.max(GLOBAL_KEEP_LIMIT - 1, 0);
            const { owner, repo } = context.repo;
            const targetName = process.env.ARTIFACT_NAME || 'artifact';
            const targetGroup = artifactGroupName(targetName);

            function artifactGroupName(name) {
              return name
                .replace(/-\d{8,}$/u, '')
                .replace(/-\d{6,}-\d+$/u, '')
                .replace(/-run-\d+$/u, '')
                .replace(/-attempt-\d+$/u, '');
            }

            function compareArtifactsNewestFirst(left, right) {
              const createdDiff = Date.parse(right.created_at) - Date.parse(left.created_at);
              if (createdDiff !== 0) {
                return createdDiff;
              }
              return right.id - left.id;
            }

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const groups = new Map();
            for (const artifact of artifacts) {
              const group = artifactGroupName(artifact.name);
              if (!groups.has(group)) {
                groups.set(group, []);
              }
              groups.get(group).push(artifact);
            }

            const deleteById = new Map();
            const retainedByGroup = [];

            for (const [group, groupArtifacts] of groups) {
              groupArtifacts.sort(compareArtifactsNewestFirst);
              const [newest, ...older] = groupArtifacts;
              if (group === targetGroup) {
                for (const artifact of groupArtifacts) {
                  deleteById.set(artifact.id, {
                    artifact,
                    group,
                    reason: `same logical group as upcoming upload: ${targetGroup}`,
                  });
                }
                continue;
              }
              if (newest) {
                retainedByGroup.push(newest);
              }
              for (const artifact of older) {
                deleteById.set(artifact.id, {
                  artifact,
                  group,
                  reason: 'older artifact in logical group',
                });
              }
            }

            retainedByGroup.sort(compareArtifactsNewestFirst);

            for (const artifact of retainedByGroup.slice(PRE_UPLOAD_KEEP_LIMIT)) {
              deleteById.set(artifact.id, {
                artifact,
                group: artifactGroupName(artifact.name),
                reason: `reserve one slot while keeping newest ${GLOBAL_KEEP_LIMIT} artifacts after upload`,
              });
            }

            const deleteCandidates = Array.from(deleteById.values())
              .sort((left, right) => compareArtifactsNewestFirst(left.artifact, right.artifact));

            core.info(`Found ${artifacts.length} artifact(s); deleting ${deleteCandidates.length} before uploading ${targetName}.`);

            for (const entry of deleteCandidates) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: entry.artifact.id,
                });
                core.info(`Deleted artifact ${entry.artifact.name} (${entry.artifact.id}) from group ${entry.group}: ${entry.reason}`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                core.warning(`Could not delete artifact ${entry.artifact.name} (${entry.artifact.id}) from group ${entry.group}: ${message}`);
              }
            }

      - name: Upload smoke artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: full-smoke-sequential-${{ matrix.variant }}-artifacts
          retention-days: 1
          if-no-files-found: warn
          path: |
            ${{ steps.paths.outputs.build_root_apache }}/logs
            ${{ steps.paths.outputs.build_root_apache }}/results
            ${{ steps.paths.outputs.build_root }}/logs
            ${{ steps.paths.outputs.build_root }}/results
