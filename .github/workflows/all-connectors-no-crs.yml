name: All Connector No-CRS Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 3'

permissions:
  contents: read

jobs:
  no-crs:
    # A row is a supported current execution target, not a Cartesian claim that
    # every connector supports every protocol or Phase-4 mode. In particular,
    # the full-lifecycle profile below is a source-wiring/baseline profile until
    # its canonical real-host evidence proves the advertised capabilities.
    name: No-CRS / ${{ matrix.connector }} / ${{ matrix.profile }} / ${{ matrix.protocol }} / ${{ matrix.phase4_mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # These two native adapters have P1--P4 source wiring, but no job is
          # allowed to call that wiring verified before the canonical host
          # artifacts prove it. The smoke harnesses currently load `safe`.
          - connector: apache
            integration_mode: native-httpd-module
            protocol: http1
            phase4_mode: safe
            profile: full-lifecycle-low-latency
            evidence_scope: source-wiring-and-baseline-only
          - connector: nginx
            integration_mode: native-nginx-http-module
            protocol: http1
            phase4_mode: safe
            profile: full-lifecycle-low-latency
            evidence_scope: source-wiring-and-baseline-only
          # HAProxy's selected SPOE/SPOP path currently stops at response
          # headers. Envoy and Traefik use pre-upstream authorization paths;
          # lighttpd has no native body hook. None has a Phase-4 host path.
          - connector: haproxy
            integration_mode: spoe-spop-agent
            protocol: http1
            phase4_mode: not_applicable
            profile: header-compatibility
            evidence_scope: no-response-body-host-path
          - connector: envoy
            integration_mode: http-ext-authz-service
            protocol: http1
            phase4_mode: not_applicable
            profile: request-only-compatibility
            evidence_scope: no-response-host-path
          - connector: traefik
            integration_mode: http-forwardauth-service
            protocol: http1
            phase4_mode: not_applicable
            profile: request-only-compatibility
            evidence_scope: no-response-host-path
          - connector: lighttpd
            integration_mode: native-lighttpd-plugin
            protocol: http1
            phase4_mode: not_applicable
            profile: header-compatibility
            evidence_scope: no-native-body-host-path
        # HTTP/2 and minimal/strict are intentionally not expanded here: no
        # current canonical real-host artifact proves those combinations. Add
        # a row only with its matching host-produced evidence contract.
    env:
      ALLOW_RUNTIME_BUILDS: "1"
      ALLOW_RUNTIME_DOWNLOADS: "1"
      CI_PROFILE: ${{ matrix.profile }}
      CI_INTEGRATION_MODE: ${{ matrix.integration_mode }}
      CI_PROTOCOL: ${{ matrix.protocol }}
      CI_PHASE4_MODE: ${{ matrix.phase4_mode }}
      CI_EVIDENCE_SCOPE: ${{ matrix.evidence_scope }}
      NO_CRS_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"

      - name: Declare selected CI profile and evidence scope
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          case "$CI_PROTOCOL" in
            http1) ;;
            *) echo "unsupported declared protocol: $CI_PROTOCOL" >&2; exit 2 ;;
          esac
          case "$CI_PHASE4_MODE" in
            safe|not_applicable) ;;
            *) echo "unsupported declared Phase-4 mode: $CI_PHASE4_MODE" >&2; exit 2 ;;
          esac
          {
            echo "### $CONNECTOR CI profile"
            echo
            echo "| Matrix axis | Selected value |"
            echo "| --- | --- |"
            echo "| integration_mode | \`$CI_INTEGRATION_MODE\` |"
            echo "| protocol | \`$CI_PROTOCOL\` |"
            echo "| phase4_mode | \`$CI_PHASE4_MODE\` |"
            echo "| profile | \`$CI_PROFILE\` |"
            echo "| evidence scope | \`$CI_EVIDENCE_SCOPE\` |"
            echo
            echo "This job runs the existing canonical No-CRS baseline only. A matrix row does not assert a P1--P4 host path, first-byte behavior, or a late-intervention outcome; those require canonical real-host evidence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify declared profile against capabilities
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          python3 - "$CONNECTOR" "$CI_INTEGRATION_MODE" "$CI_PROTOCOL" "$CI_PHASE4_MODE" <<'PY'
          import json
          import sys

          connector, integration_mode, protocol, phase4_mode = sys.argv[1:]
          path = f"connectors/{connector}/capabilities.json"
          with open(path, encoding="utf-8") as source:
              manifest = json.load(source)

          actual_integration_mode = manifest.get("integration_mode")
          if actual_integration_mode != integration_mode:
              raise SystemExit(
                  f"{connector}: CI integration_mode={integration_mode!r} does not match "
                  f"capability manifest {actual_integration_mode!r}"
              )

          capabilities = manifest.get("capabilities") or {}
          phase4_state = (capabilities.get("phase4") or {}).get("state")
          http1_state = (capabilities.get("http1_content_length") or {}).get("state")
          if protocol != "http1" or http1_state == "unsupported_by_host_model":
              raise SystemExit(
                  f"{connector}: declared protocol {protocol!r} is not a supported current "
                  f"HTTP/1 baseline target (manifest state: {http1_state!r})"
              )
          if phase4_mode == "safe" and phase4_state in {
              "not_implemented", "unsupported_by_host_model"
          }:
              raise SystemExit(
                  f"{connector}: safe Phase-4 profile requires a wired Phase-4 path; "
                  f"manifest state is {phase4_state!r}"
              )
          if phase4_mode == "not_applicable" and phase4_state not in {
              "not_implemented", "unsupported_by_host_model"
          }:
              raise SystemExit(
                  f"{connector}: not_applicable Phase-4 profile is stale; "
                  f"manifest state is {phase4_state!r}"
              )
          print(f"ok {connector}: {integration_mode}, {protocol}, {phase4_mode}")
          PY

      - name: Configure supported NGINX Phase-4 mode
        if: matrix.connector == 'nginx'
        run: |
          set -eu
          test "$CI_PHASE4_MODE" = safe
          echo "NGINX_PHASE4_MODE=$CI_PHASE4_MODE" >> "$GITHUB_ENV"

      - name: Initialize canonical evidence paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          build_root="$verified_root/build"
          evidence_root="$build_root/no-crs-evidence"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$build_root"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
            echo "EVIDENCE_ROOT=$evidence_root"
            echo "NO_CRS_EVIDENCE_ROOT=$evidence_root"
            echo "RUNTIME_REPORT_OUTPUT_ROOT=$verified_root/runtime-component-reports"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"
          mkdir -p "$evidence_root"

      - name: Prepare framework dependencies
        run: |
          set -eu
          make setup-dev

      - name: Provision host component
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          case "$CONNECTOR" in
            apache|nginx|haproxy)
              RUNTIME_COMPONENT_TARGET="$CONNECTOR" make prepare-runtime-components
              ;;
            envoy)
              make prepare-envoy-runtime
              ;;
            traefik)
              make prepare-traefik-runtime
              ;;
            lighttpd)
              make prepare-lighttpd-runtime-build
              ;;
            *)
              echo "Unknown connector: $CONNECTOR" >&2
              exit 2
              ;;
          esac

      - name: Build connector
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          make "build-$CONNECTOR"

      - name: Validate configuration load
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          make "check-config-$CONNECTOR"

      - name: Run request-free start smoke
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          make "start-smoke-$CONNECTOR"

      - name: Run canonical No-CRS baseline
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          make "no-crs-baseline-$CONNECTOR"

      - name: Validate canonical evidence
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          make "evidence-check-$CONNECTOR"
          python3 modules/ModSecurity-test-Framework/ci/checks/catalog/no_crs_baseline.py validate \
            --evidence-root "$EVIDENCE_ROOT/$CONNECTOR/$NO_CRS_RUN_ID" \
            --connector "$CONNECTOR" \
            --capabilities "connectors/$CONNECTOR/capabilities.json" \
            --check all

      - name: Publish canonical status
        if: always()
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          result="$EVIDENCE_ROOT/$CONNECTOR/$NO_CRS_RUN_ID/result.json"
          if [ ! -f "$result" ]; then
            echo "::error::Canonical result.json is missing for $CONNECTOR"
            exit 1
          fi
          status=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$result")
          {
            echo "### $CONNECTOR canonical No-CRS status"
            echo
            echo "\`$status\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" != PASS ]; then
            echo "::warning::Canonical No-CRS status for $CONNECTOR is $status; this is not PASS evidence"
          fi

      - name: Check process cleanup
        if: always()
        env:
          CONNECTOR: ${{ matrix.connector }}
        run: |
          set -eu
          cleanup_log="$EVIDENCE_ROOT/$CONNECTOR/$NO_CRS_RUN_ID/logs/process_cleanup.log"
          test -f "$cleanup_log"
          test "$(cat "$cleanup_log")" = none

      - name: Upload canonical connector evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: no-crs-${{ matrix.connector }}-${{ github.run_id }}-${{ github.run_attempt }}
          # Keep canonical evidence within the requested 10--14 day window.
          retention-days: 10
          if-no-files-found: warn
          path: ${{ env.EVIDENCE_ROOT }}/${{ matrix.connector }}/${{ env.NO_CRS_RUN_ID }}/

  aggregate:
    name: No-CRS / aggregate canonical results
    if: always()
    needs:
      - no-crs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout summary generator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"

      - name: Initialize aggregate paths
        run: |
          set -eu
          evidence_root="$RUNNER_TEMP/no-crs-evidence"
          {
            echo "EVIDENCE_ROOT=$evidence_root"
            echo "NO_CRS_RUN_ID=${{ github.run_id }}-${{ github.run_attempt }}"
          } >> "$GITHUB_ENV"
          mkdir -p "$evidence_root"

      - name: Download connector evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: no-crs-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: downloaded

      - name: Restore canonical evidence layout
        if: always()
        run: |
          set -eu
          status=0
          for connector in apache nginx haproxy envoy traefik lighttpd; do
            artifact_dir="downloaded/no-crs-$connector-${{ github.run_id }}-${{ github.run_attempt }}"
            destination="$EVIDENCE_ROOT/$connector/$NO_CRS_RUN_ID"
            mkdir -p "$destination"
            if [ -d "$artifact_dir" ]; then
              cp -a "$artifact_dir/." "$destination/"
            fi
            if ! python3 modules/ModSecurity-test-Framework/ci/checks/catalog/no_crs_baseline.py validate \
              --evidence-root "$destination" \
              --connector "$connector" \
              --capabilities "connectors/$connector/capabilities.json" \
              --check all; then
              rm -rf "$destination"
              status=1
            fi
          done
          exit "$status"

      - name: Render evidence-merged capability catalog
        if: success()
        run: |
          set -eu
          make capabilities-all-connectors-evidence \
            CAPABILITY_REPORT_EVIDENCE_ROOT="$EVIDENCE_ROOT" \
            CAPABILITY_REPORT_RUN_ID="$NO_CRS_RUN_ID" \
            CAPABILITY_REPORT_OUTPUT_DIR="$EVIDENCE_ROOT/connector-capabilities"

      - name: Upload evidence-merged capability catalog
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: connector-capabilities-${{ github.run_id }}-${{ github.run_attempt }}
          # Keep canonical evidence within the requested 10--14 day window.
          retention-days: 10
          if-no-files-found: error
          path: |
            ${{ env.EVIDENCE_ROOT }}/connector-capabilities/connector-capabilities.generated.json
            ${{ env.EVIDENCE_ROOT }}/connector-capabilities/connector-capabilities.generated.md
            ${{ env.EVIDENCE_ROOT }}/connector-capabilities/connector-capabilities.generated.de.md

      - name: Build result-only aggregate
        if: always()
        run: |
          set -eu
          python3 modules/ModSecurity-test-Framework/ci/checks/catalog/no_crs_baseline.py summarize \
            --evidence-root "$EVIDENCE_ROOT" \
            --run-id "$NO_CRS_RUN_ID" \
            --output-json "$EVIDENCE_ROOT/all-connectors-no-crs-summary.json" \
            --output-md "$EVIDENCE_ROOT/all-connectors-no-crs-summary.md" \
            --output-md-de "$EVIDENCE_ROOT/all-connectors-no-crs-summary.de.md"

      - name: Upload aggregate summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: all-connectors-no-crs-summary-${{ github.run_id }}-${{ github.run_attempt }}
          # Keep canonical evidence within the requested 10--14 day window.
          retention-days: 10
          if-no-files-found: error
          path: |
            ${{ env.EVIDENCE_ROOT }}/all-connectors-no-crs-summary.json
            ${{ env.EVIDENCE_ROOT }}/all-connectors-no-crs-summary.md
            ${{ env.EVIDENCE_ROOT }}/all-connectors-no-crs-summary.de.md
