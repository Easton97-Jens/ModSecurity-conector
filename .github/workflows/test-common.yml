name: test-common

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  common-structure:
    runs-on: ubuntu-latest
    env:
      SOURCE_ROOT: ${{ runner.temp }}/sources
      BUILD_ROOT: ${{ runner.temp }}/ModSecurity-conector-build
      TMP_ROOT: ${{ runner.temp }}/ModSecurity-conector-build/tmp
      LOG_ROOT: ${{ runner.temp }}/ModSecurity-conector-build/logs
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Check common scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          test ! -d tests
          test -f common/include/msconnector/request.h
          test -f common/include/msconnector/response.h
          test -f common/include/msconnector/transaction.h
          test -f common/include/msconnector/capabilities.h
          test -f common/include/msconnector/logging.h
          test -f common/src/status.c
          test -f common/src/intervention.c
          test -f common/src/origin.c
          test -f common/src/capabilities.c
          test -f config/testing/import-status.json
          test -f modules/ModSecurity-test-Framework/docs/imports/common/modsecurity-v2-regression-map.md
          test -f modules/ModSecurity-test-Framework/docs/imports/common/modsecurity-v3-regression-map.md
          test -f modules/ModSecurity-test-Framework/docs/testing/v2-vs-v3-test-compatibility.md
          test -f reports/testing/real-world-connector-validation.md
          test ! -d docs/testing
          test ! -d connectors/apache/tests
          test ! -d connectors/nginx/tests
          test -f docs/architecture/capability-model.md
          test -f docs/architecture/status-model.md
          test -f docs/architecture/connector-adapter-interface.md
          test -f docs/architecture/common-runtime-boundaries.md
          test -f docs/connectors/future-connectors.md
          test -f ci/check-common-helpers.sh
      - name: Lightweight framework checks
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          make quick-check
          make -n smoke-common
          make -n smoke-apache
          make -n smoke-nginx
          make -n smoke-all
          make -n runtime-matrix-all
