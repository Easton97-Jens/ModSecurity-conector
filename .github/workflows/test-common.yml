name: test-common

on:
  push:
  pull_request:

jobs:
  common-structure:
    runs-on: ubuntu-latest
    env:
      MODSECURITY_V3_SOURCE_DIR: ${{ github.workspace }}/ModSecurity_V3
      MODSECURITY_V3_DIR: ${{ runner.temp }}/ModSecurity_V3_build
      BUILD_ROOT: ${{ runner.temp }}/ModSecurity-conector-build
      LOG_DIR: ${{ runner.temp }}/ModSecurity-conector-build/logs
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/python-pycache
    steps:
      - uses: actions/checkout@v4
      - name: Check common scaffold
        run: |
          set -eu
          test -f common/include/msconnector/request.h
          test -f common/include/msconnector/response.h
          test -f common/include/msconnector/transaction.h
          test -f common/include/msconnector/capabilities.h
          test -f common/include/msconnector/logging.h
          test -f tests/common/modsecurity-v2-regression-map.md
          test -f tests/common/modsecurity-v3-regression-map.md
          test -f tests/common/v2-regression-map.md
          test -f tests/common/v3-regression-map.md
          test -f docs/v2-vs-v3-test-compatibility.md
          test -f docs/real-world-connector-validation.md
      - name: Compile Python skeletons
        run: |
          mkdir -p "$PYTHONPYCACHEPREFIX"
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py
      - name: Check shared case runner
        run: |
          set -eu
          mkdir -p "$BUILD_ROOT/case-runner"
          for case_file in \
            tests/common/cases/minimal/*.yaml \
            tests/common/cases/imported/*.yaml \
            tests/common/cases/v2-imported/*.yaml \
            tests/common/cases/v3-imported/*.yaml; do
            name=$(basename "$case_file" .yaml)
            out="$BUILD_ROOT/case-runner/$name"
            mkdir -p "$out"
            python3 tests/runners/case_cli.py materialize \
              --case "$case_file" \
              --rules-file "$out/rules.conf" \
              --env-file "$out/case.env" \
              --headers-file "$out/request-headers.txt" \
              --body-file "$out/request-body.bin" \
              --docroot "$out/htdocs" \
              --audit-log-file "$out/audit.log" \
              --audit-log-dir "$out/audit"
            grep -q 'SecRuleEngine On' "$out/rules.conf"
            grep -q '^REQUEST_METHOD=' "$out/case.env"
            test -f "$out/htdocs/index.html"
            . "$out/case.env"
            if [ -n "${EXPECT_RESPONSE_CONTAINS:-}" ]; then
              printf '%s\n' "$EXPECT_RESPONSE_CONTAINS" > "$out/response-body.txt"
            else
              : > "$out/response-body.txt"
            fi
            python3 - "$case_file" "$out/audit.log" <<'PY'
import sys
from pathlib import Path

sys.path.insert(0, "tests/runners")
from runner_core import expected_audit_log, load_case

case = load_case(sys.argv[1])
audit = expected_audit_log(case)
content = "\n".join(
    str(value) for key, value in audit.items()
    if key != "required" and value not in (None, "")
)
Path(sys.argv[2]).write_text(content + ("\n" if content else ""), encoding="utf-8")
PY
            python3 tests/runners/case_cli.py assert-status \
              --case "$case_file" \
              --actual-status "$EXPECT_STATUS" \
              --response-body-file "$out/response-body.txt" \
              --audit-log-file "$out/audit.log" \
              --status-file "$out/status.txt"
          done
          python3 tests/runners/case_cli.py list-cases \
            --repo-root "$GITHUB_WORKSPACE" \
            --connector apache \
            --scope common > "$BUILD_ROOT/case-runner/apache-common-cases.txt"
          python3 tests/runners/case_cli.py list-cases \
            --repo-root "$GITHUB_WORKSPACE" \
            --connector nginx \
            --scope all > "$BUILD_ROOT/case-runner/nginx-all-cases.txt"
          python3 -m json.tool tests/import-status.json > "$BUILD_ROOT/case-runner/import-status.pretty.json"
      - name: Check real-world summary schema
        run: |
          set -eu
          mkdir -p "$BUILD_ROOT/schema-check"
          : > "$BUILD_ROOT/schema-check/empty-results.jsonl"
          python3 tests/runners/case_cli.py summarize-results \
            --connector apache \
            --input-jsonl "$BUILD_ROOT/schema-check/empty-results.jsonl" \
            --summary-json "$BUILD_ROOT/schema-check/apache-summary.json" \
            --summary-text "$BUILD_ROOT/schema-check/apache-summary.txt" \
            --connector-path real-world \
            --validation-mode real-world-connector-path \
            --server apache \
            --server-binary "$BUILD_ROOT/apache-runtime/httpd/bin/httpd" \
            --module "$BUILD_ROOT/apache-build/output/apache/mod_security3.so" \
            --libmodsecurity "$BUILD_ROOT/apache-build/output/modsecurity/lib/libmodsecurity.so"
          python3 - "$BUILD_ROOT/schema-check/apache-summary.json" <<'PY'
import json
import sys
from pathlib import Path

data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
apache = data["apache"]
assert apache["connector_path"] == "real-world"
assert apache["validation_mode"] == "real-world-connector-path"
assert apache["server"] == "apache"
assert apache["verified_variables"] == []
for key in ("server_binary", "module", "libmodsecurity", "summary", "cases"):
    assert key in apache
PY
      - name: Check make smoke targets and boundaries
        run: |
          set -eu
          make -n smoke-common
          make -n smoke-apache
          make -n smoke-nginx
          make -n smoke-all
          if grep -R -i -n -E 'apache|nginx|haproxy|envoy|lighttpd|traefik|httpd|ngx_' common/include common/src; then
            echo "common code contains connector-specific text or dependency"
            exit 1
          fi
      - name: Check v3 API smoke prerequisites
        run: |
          set +e
          sh ci/check-v3-api-smoke-prereqs.sh
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "v3 API smoke prerequisites blocked in this workflow"
            exit 0
          fi
          exit "$rc"
      - name: Run v3 API smoke when available
        run: |
          set +e
          sh ci/run-v3-api-smoke.sh
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "v3 API smoke run blocked in this workflow"
            exit 0
          fi
          exit "$rc"
      - name: Upload common smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: common-smoke-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/ModSecurity-conector-build/case-runner
            ${{ runner.temp }}/ModSecurity-conector-build/logs
            ${{ runner.temp }}/ModSecurity-conector-build/results
