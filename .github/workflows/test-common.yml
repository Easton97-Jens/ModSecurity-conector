name: test-common

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  common-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Initialize runner temp paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$verified_root/build"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
          } >> "$GITHUB_ENV"
      - name: Check common scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          # Top-level tests/ is repo-owned for lightweight repository tooling tests.
          test -d tests
          test -f tests/test_update_github_actions_versions.py
          test -f common/include/msconnector/request.h
          test -f common/include/msconnector/response.h
          test -f common/include/msconnector/transaction.h
          test -f common/include/msconnector/capabilities.h
          test -f common/include/msconnector/logging.h
          test -f common/src/status.c
          test -f common/src/intervention.c
          test -f common/src/origin.c
          test -f common/src/capabilities.c
          test -f config/testing/import-status.json
          test -f modules/ModSecurity-test-Framework/docs/catalog-and-cases.md
          test -f modules/ModSecurity-test-Framework/docs/testing-and-evidence.md
          test -f docs/testing-and-evidence.md
          test ! -d connectors/apache/tests
          test ! -d connectors/nginx/tests
          test -f docs/architecture.md
          test -f docs/connectors/README.md
          test -f ci/checks/common/check-common-helpers.sh
      - name: Lightweight framework checks
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          make quick-check
          make -n smoke-common
          make -n smoke-apache
          make -n smoke-nginx
          make -n smoke-all
          make -n runtime-matrix-all
