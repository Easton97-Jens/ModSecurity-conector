name: test-nginx

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nginx-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Initialize runner temp paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$verified_root/build"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
          } >> "$GITHUB_ENV"
      - name: Check NGINX scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          test -f connectors/nginx/README.md
          test -f connectors/nginx/TODO.md
          test -f connectors/nginx/harness/nginx_smoke.conf
          test -x connectors/nginx/harness/run_nginx_smoke.sh
          test -f connectors/nginx/harness/README.md
          test -f docs/connectors/nginx.md
          test ! -d connectors/nginx/tests
          test -f modules/ModSecurity-test-Framework/tests/cases/connector-specific/nginx/nginx_tx_scoring_absolute_block.yaml
          test -f modules/ModSecurity-test-Framework/docs/connector-integration.md
          test -f config/testing/import-status.json
          test -f docs/testing-and-evidence.md
          grep -q 'Status:' connectors/nginx/TODO.md
      - name: Syntax and dry-run checks
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          sh -n connectors/nginx/harness/run_nginx_smoke.sh
          make -n smoke-nginx
          make quick-check
