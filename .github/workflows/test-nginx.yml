name: test-nginx

on:
  push:
  pull_request:

jobs:
  nginx-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check NGINX scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          test -f connectors/nginx/README.md
          test -f connectors/nginx/TODO.md
          test -f connectors/nginx/harness/nginx_smoke.conf
          test -x connectors/nginx/harness/run_nginx_smoke.sh
          test -f connectors/nginx/harness/README.md
          test -f connectors/nginx/docs/architecture.md
          test -f connectors/nginx/docs/build.md
          test -f connectors/nginx/docs/public-sources.md
          test -f connectors/nginx/tests/cases/imported/nginx_tx_scoring_absolute_block.yaml
          test -f docs/testing/imports/nginx-regression-map.md
          test -f config/testing/import-status.json
          test -f docs/connectors/nginx-poc.md
          test -f docs/connectors/apache-vs-nginx-poc.md
          grep -q 'Status:' connectors/nginx/TODO.md
      - name: Syntax and dry-run checks
        run: |
          make setup-dev
          sh -n connectors/nginx/harness/run_nginx_smoke.sh
          make -n smoke-nginx
          make quick-check
