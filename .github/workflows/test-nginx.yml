name: test-nginx

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nginx-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check NGINX scaffold
        run: |
          set -eu
          test -d modules/ModSecurity-test-Framework
          test -f connectors/nginx/README.md
          test -f connectors/nginx/TODO.md
          test -f connectors/nginx/harness/nginx_smoke.conf
          test -x connectors/nginx/harness/run_nginx_smoke.sh
          test -f connectors/nginx/harness/README.md
          test -f connectors/nginx/docs/architecture.md
          test -f connectors/nginx/docs/build.md
          test -f connectors/nginx/docs/public-sources.md
          test ! -d connectors/nginx/tests
          test -f modules/ModSecurity-test-Framework/tests/cases/connector-specific/nginx/nginx_tx_scoring_absolute_block.yaml
          test -f modules/ModSecurity-test-Framework/docs/testing/imports/nginx-regression-map.md
          test -f config/testing/import-status.json
          test -f reports/testing/nginx-poc.md
          test -f reports/testing/apache-vs-nginx-poc.md
          grep -q 'Status:' connectors/nginx/TODO.md
      - name: Syntax and dry-run checks
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          sh -n connectors/nginx/harness/run_nginx_smoke.sh
          make -n smoke-nginx
          make quick-check
