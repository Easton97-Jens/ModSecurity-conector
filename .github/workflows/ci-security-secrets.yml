name: Secret scanning

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '41 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pull-request-range:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Fetch checksum-verified Gitleaks
        run: python3 ci/tools/fetch_security_tool.py --tool gitleaks --destination "$RUNNER_TEMP/security-tools"
      - name: Scan exact pull-request commit range with redaction
        run: |
          set -eu
          BASE_COMMIT="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          "$RUNNER_TEMP/security-tools/gitleaks" git --redact=100 --log-opts="$BASE_COMMIT..$HEAD_SHA" .

  advisory-full-history:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Fetch checksum-verified Gitleaks
        run: python3 ci/tools/fetch_security_tool.py --tool gitleaks --destination "$RUNNER_TEMP/security-tools"
      - name: Scan full history with redaction (advisory)
        continue-on-error: true
        run: |
          "$RUNNER_TEMP/security-tools/gitleaks" git --redact=100 --log-opts='--all' .
      - name: Record advisory limitation
        if: always()
        run: echo 'Full-history Gitleaks is advisory until historical findings are triaged.' >> "$GITHUB_STEP_SUMMARY"
