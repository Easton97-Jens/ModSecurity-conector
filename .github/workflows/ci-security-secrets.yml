name: Secret scanning

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pull-request-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch checksum-verified Gitleaks
        run: python3 ci/tools/fetch_security_tool.py --tool gitleaks_cli --destination "$RUNNER_TEMP/security-tools"
      - name: Scan the pull-request commit range with redaction
        run: |
          BASE_COMMIT="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          "$RUNNER_TEMP/security-tools/gitleaks" git --redact=100 --log-opts="$BASE_COMMIT..$HEAD_SHA" .

  scheduled-full-history:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch checksum-verified Gitleaks
        run: python3 ci/tools/fetch_security_tool.py --tool gitleaks_cli --destination "$RUNNER_TEMP/security-tools"
      - name: Scan full history with redaction
        run: |
          "$RUNNER_TEMP/security-tools/gitleaks" git --redact=100 --log-opts="--all" .
