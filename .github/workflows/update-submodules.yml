name: Update submodules

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

# Repository settings must also allow this workflow to open pull requests:
# Settings -> Actions -> General -> Workflow permissions:
# - enable Read and write permissions
# - enable "Allow GitHub Actions to create and approve pull requests"
permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    name: Update submodules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules recursively
        run: git submodule update --remote --recursive

      - name: Run quick check
        id: quick_check
        continue-on-error: true
        run: make quick-check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          title: "chore: update submodules"
          commit-message: "chore: update submodules"
          branch: chore/update-submodules
          base: master
          delete-branch: true
          body: |
            Updates all Git submodules recursively using:

            ```sh
            git submodule update --remote --recursive
            ```

            Validation:
            - `make quick-check`: ${{ steps.quick_check.outcome }}

            If `make quick-check` failed, this pull request is still opened so the update can be reviewed.

            Repository setting required for `GITHUB_TOKEN` PR creation:
            Settings -> Actions -> General -> Workflow permissions must have `Read and write permissions` enabled and `Allow GitHub Actions to create and approve pull requests` enabled. If a `GH_PAT` secret is configured, this workflow uses it for pull request creation; otherwise it falls back to `GITHUB_TOKEN`.

      - name: Fail if quick check failed
        if: steps.quick_check.outcome == 'failure'
        run: |
          echo "make quick-check failed after updating submodules. Review the generated pull request."
          exit 1
