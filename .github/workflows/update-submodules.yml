name: Update submodules

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

# The isolated publisher job must be allowed to create pull requests:
# Settings -> Actions -> General -> Workflow permissions:
# - enable Read and write permissions
# - enable "Allow GitHub Actions to create and approve pull requests"
permissions:
  contents: read

env:
  SUBMODULE_PATH: modules/ModSecurity-test-Framework
  SUBMODULE_URL: https://github.com/Easton97-Jens/ModSecurity-test-Framework.git

jobs:
  resolve-submodule-update:
    name: Resolve submodule update
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      candidate_sha: ${{ steps.resolve.outputs.candidate_sha }}
      submodule_ref: ${{ steps.resolve.outputs.submodule_ref }}
      changed: ${{ steps.resolve.outputs.changed }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
    steps:
      - name: Check out trusted Parent default-branch metadata
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve the official submodule default ref and commit
        id: resolve
        run: |
          set -euo pipefail
          candidate_base_sha="$(git rev-parse HEAD)"
          printf 'base_sha=%s\n' "$candidate_base_sha" >> "$GITHUB_OUTPUT"
          resolve_submodule_default_ref() {
            local reference
            reference="$(
              git ls-remote --symref --exit-code "$SUBMODULE_URL" HEAD | \
                awk '$1 == "ref:" && $3 == "HEAD" { print $2; exit }'
            )"
            if ! printf '%s\n' "$reference" | grep -Eq '^refs/heads/[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
              echo "Resolved submodule default ref is invalid: $reference" >&2
              return 1
            fi
            printf '%s\n' "$reference"
          }

          submodule_ref="$(resolve_submodule_default_ref)"
          candidate_sha="$(git ls-remote --exit-code "$SUBMODULE_URL" "$submodule_ref" | awk 'NR == 1 { print $1; exit }')"
          current_entry="$(git ls-tree -d --format='%(objectmode) %(objecttype) %(objectname)' HEAD -- "$SUBMODULE_PATH")"
          read -r current_mode current_type current_sha trailing <<< "$current_entry"

          if [ -n "$trailing" ] || [ "$current_mode" != "160000" ] || [ "$current_type" != "commit" ]; then
            echo "Current submodule entry is not one exact gitlink: $current_entry" >&2
            exit 1
          fi
          if ! printf '%s\n' "$candidate_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Resolved submodule revision is not a full SHA-1: $candidate_sha" >&2
            exit 1
          fi
          if ! printf '%s\n' "$current_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Current gitlink is not a full SHA-1: $current_sha" >&2
            exit 1
          fi

          printf 'candidate_sha=%s\n' "$candidate_sha" >> "$GITHUB_OUTPUT"
          printf 'submodule_ref=%s\n' "$submodule_ref" >> "$GITHUB_OUTPUT"
          if [ "$candidate_sha" = "$current_sha" ]; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
            echo "No submodule changes detected."
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
            echo "Resolved submodule update: $current_sha -> $candidate_sha ($submodule_ref)"
          fi

  validate-submodule-update:
    name: Validate submodule update
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.resolve-submodule-update.outputs.changed == 'true' }}
    needs: resolve-submodule-update
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      CANDIDATE_SHA: ${{ needs.resolve-submodule-update.outputs.candidate_sha }}
      CANDIDATE_BASE_SHA: ${{ needs.resolve-submodule-update.outputs.base_sha }}
      SUBMODULE_REF: ${{ needs.resolve-submodule-update.outputs.submodule_ref }}
    steps:
      - name: Check out trusted Parent default branch for read-only validation
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"

      - name: Revalidate and check out the resolved submodule revision
        run: |
          set -euo pipefail
          resolve_submodule_default_ref() {
            local reference
            reference="$(
              git ls-remote --symref --exit-code "$SUBMODULE_URL" HEAD | \
                awk '$1 == "ref:" && $3 == "HEAD" { print $2; exit }'
            )"
            if ! printf '%s\n' "$reference" | grep -Eq '^refs/heads/[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
              echo "Resolved submodule default ref is invalid: $reference" >&2
              return 1
            fi
            printf '%s\n' "$reference"
          }

          if ! printf '%s\n' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Candidate revision is not a full SHA-1: $CANDIDATE_SHA" >&2
            exit 1
          fi
          if ! printf '%s\n' "$SUBMODULE_REF" | grep -Eq '^refs/heads/[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
            echo "Candidate submodule ref is invalid: $SUBMODULE_REF" >&2
            exit 1
          fi
          resolved_ref="$(resolve_submodule_default_ref)"
          if [ "$resolved_ref" != "$SUBMODULE_REF" ]; then
            echo "Submodule default ref changed after resolution: $SUBMODULE_REF -> $resolved_ref" >&2
            exit 1
          fi
          expected_sha="$(git ls-remote --exit-code "$SUBMODULE_URL" "$SUBMODULE_REF" | awk 'NR == 1 { print $1; exit }')"
          if [ "$expected_sha" != "$CANDIDATE_SHA" ]; then
            echo "Official submodule ref changed after resolution; refusing $CANDIDATE_SHA." >&2
            exit 1
          fi
          git -C "$SUBMODULE_PATH" fetch --no-tags origin "$CANDIDATE_SHA"
          git -C "$SUBMODULE_PATH" checkout --detach "$CANDIDATE_SHA"
          git -C "$SUBMODULE_PATH" submodule update --init --recursive

      - name: Run quick check without write permissions
        run: make quick-check

  create-submodule-update-pr:
    name: Create or update a draft submodule pull request
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.resolve-submodule-update.outputs.changed == 'true' && needs.validate-submodule-update.result == 'success' }}
    needs:
      - resolve-submodule-update
      - validate-submodule-update
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      CANDIDATE_SHA: ${{ needs.resolve-submodule-update.outputs.candidate_sha }}
      CANDIDATE_BASE_SHA: ${{ needs.resolve-submodule-update.outputs.base_sha }}
      SUBMODULE_REF: ${{ needs.resolve-submodule-update.outputs.submodule_ref }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      UPDATE_BRANCH: chore/update-submodules
      PR_TITLE: "chore: propose submodule update"
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Check out trusted Parent default branch without submodules
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate the official submodule default ref and revision
        run: |
          set -euo pipefail
          resolve_submodule_default_ref() {
            local reference
            reference="$(
              git ls-remote --symref --exit-code "$SUBMODULE_URL" HEAD | \
                awk '$1 == "ref:" && $3 == "HEAD" { print $2; exit }'
            )"
            if ! printf '%s\n' "$reference" | grep -Eq '^refs/heads/[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
              echo "Resolved submodule default ref is invalid: $reference" >&2
              return 1
            fi
            printf '%s\n' "$reference"
          }

          if ! printf '%s\n' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Candidate revision is not a full SHA-1: $CANDIDATE_SHA" >&2
            exit 1
          fi
          if ! printf '%s\n' "$SUBMODULE_REF" | grep -Eq '^refs/heads/[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
            echo "Candidate submodule ref is invalid: $SUBMODULE_REF" >&2
            exit 1
          fi
          resolved_ref="$(resolve_submodule_default_ref)"
          if [ "$resolved_ref" != "$SUBMODULE_REF" ]; then
            echo "Submodule default ref changed after validation: $SUBMODULE_REF -> $resolved_ref" >&2
            exit 1
          fi
          expected_sha="$(git ls-remote --exit-code "$SUBMODULE_URL" "$SUBMODULE_REF" | awk 'NR == 1 { print $1; exit }')"
          if [ "$expected_sha" != "$CANDIDATE_SHA" ]; then
            echo "Official submodule ref changed after validation; refusing to publish $CANDIDATE_SHA." >&2
            exit 1
          fi

      - name: Create or update one repository-owned draft pull request without force push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$DEFAULT_BRANCH" ]; then
            echo "Publisher branch binding is invalid." >&2
            exit 1
          fi
          if [ "$UPDATE_BRANCH" != "chore/update-submodules" ]; then
            echo "Publisher branch binding is invalid." >&2
            exit 1
          fi
          if [ "$UPDATE_BRANCH" = "$DEFAULT_BRANCH" ]; then
            echo "Publisher branch binding is invalid." >&2
            exit 1
          fi
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Publisher branch binding is invalid." >&2
            exit 1
          fi
          if ! printf '%s\n' "$CANDIDATE_BASE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Candidate base revision is invalid." >&2
            exit 1
          fi
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          verified_default_sha="$(git rev-parse --verify --quiet "origin/$DEFAULT_BRANCH^{commit}")"
          if [ "$verified_default_sha" != "$CANDIDATE_BASE_SHA" ]; then
            echo "Trusted default branch changed after candidate resolution; rerun resolution and validation." >&2
            exit 1
          fi
          assert_exact_submodule_path() {
            local status_file="$1" status path count=0
            while IFS= read -r -d '' status && IFS= read -r -d '' path; do
              if [ "$status" != "M" ] || [ "$path" != "$SUBMODULE_PATH" ]; then
                echo "Refusing unexpected submodule update diff: $status $path" >&2
                return 1
              fi
              count=$((count + 1))
            done < "$status_file"
            if [ "$count" -ne 1 ]; then
              echo "Expected exactly one modified submodule gitlink." >&2
              return 1
            fi
          }

          existing_pr="$(
            gh api --method GET "repos/$GITHUB_REPOSITORY/pulls" \
              -f state=open \
              -f base="$DEFAULT_BRANCH" \
              -f head="${GITHUB_REPOSITORY_OWNER}:$UPDATE_BRANCH" \
              -f per_page=100 \
              --jq 'if length == 0 then empty elif length == 1 and ((.[0].number | type) == "number") and (.[0].number > 0) then .[0].number else error("expected zero or one matching open update pull request") end'
          )"
          if [ -n "$existing_pr" ] && ! printf '%s\n' "$existing_pr" | grep -Eq '^[1-9][0-9]*$'; then
            echo "Existing update pull request number is invalid." >&2
            exit 1
          fi

          remote_branch=false
          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" >/dev/null 2>&1; then
            remote_branch=true
          fi
          gh auth setup-git
          pr_body="$RUNNER_TEMP/submodule-update-pr-body.md"
          cat > "$pr_body" <<EOF
          ## English

          - Scope: only the Parent framework gitlink at $SUBMODULE_PATH
          - Framework default ref: $SUBMODULE_REF
          - Proposed immutable commit: $CANDIDATE_SHA
          - Validation workflow and run: validate-submodule-update ($WORKFLOW_RUN_URL)
          - Merge: no automatic merge

          ## Deutsch

          - Umfang: nur der Parent-Framework-Gitlink unter $SUBMODULE_PATH
          - Framework-Standard-Ref: $SUBMODULE_REF
          - Vorgeschlagener unveränderlicher Commit: $CANDIDATE_SHA
          - Validierungsworkflow und Run: validate-submodule-update ($WORKFLOW_RUN_URL)
          - Merge: kein automatischer Merge
          EOF

          if [ -n "$existing_pr" ]; then
            if [ "$remote_branch" != true ]; then
              echo "Open update pull request lacks its expected branch $UPDATE_BRANCH." >&2
              exit 1
            fi
            is_draft="$(gh api --method GET "repos/$GITHUB_REPOSITORY/pulls/$existing_pr" --jq '.draft')"
            if [ "$is_draft" != "true" ]; then
              echo "Existing update pull request is not a draft." >&2
              exit 1
            fi
            auto_merge="$(gh api --method GET "repos/$GITHUB_REPOSITORY/pulls/$existing_pr" --jq '.auto_merge')"
            if [ "$auto_merge" != "null" ]; then
              echo "Existing update pull request has automatic merge enabled or an unverifiable merge state." >&2
              exit 1
            fi
            git fetch --no-tags origin "$DEFAULT_BRANCH" "$UPDATE_BRANCH"
            verified_default_sha="$(git rev-parse --verify --quiet "origin/$DEFAULT_BRANCH^{commit}")"
            if [ "$verified_default_sha" != "$CANDIDATE_BASE_SHA" ]; then
              echo "Trusted default branch changed while preparing the existing update branch; rerun resolution and validation." >&2
              exit 1
            fi
            merge_base="$(git merge-base "origin/$DEFAULT_BRANCH" "origin/$UPDATE_BRANCH")"
            if [ -z "$merge_base" ]; then
              echo "Update branch has no trusted default-branch merge base." >&2
              exit 1
            fi
            branch_status_file="$RUNNER_TEMP/submodule-update-branch-status.z"
            git diff --name-status -z --no-renames "$merge_base" "origin/$UPDATE_BRANCH" > "$branch_status_file"
            assert_exact_submodule_path "$branch_status_file"
            git read-tree "origin/$DEFAULT_BRANCH"
            git update-index --add --cacheinfo "160000,$CANDIDATE_SHA,$SUBMODULE_PATH"
            if git diff-index --quiet "origin/$UPDATE_BRANCH" --; then
              echo "The existing update pull request already contains $CANDIDATE_SHA."
              exit 0
            fi
            cached_status_file="$RUNNER_TEMP/submodule-update-cached-status.z"
            git diff --cached --name-status -z --no-renames "origin/$UPDATE_BRANCH" > "$cached_status_file"
            assert_exact_submodule_path "$cached_status_file"
            git diff --cached --check
            git diff-index --check "origin/$UPDATE_BRANCH" --
            tree="$(git write-tree)"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            commit="$(git commit-tree "$tree" -p "origin/$UPDATE_BRANCH" -m "$PR_TITLE")"
            git update-ref "refs/heads/$UPDATE_BRANCH" "$commit" "origin/$UPDATE_BRANCH"
            git push origin "$UPDATE_BRANCH"
            gh pr edit "$existing_pr" --title "$PR_TITLE" --body-file "$pr_body"
            exit 0
          fi

          if [ "$remote_branch" = true ]; then
            echo "Refusing to overwrite the existing remote branch $UPDATE_BRANCH without one open draft update pull request." >&2
            exit 1
          fi
          git switch --no-track -c "$UPDATE_BRANCH" "origin/$DEFAULT_BRANCH"
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$DEFAULT_BRANCH")" ]; then
            echo "Fresh update branch is not based on the verified default branch." >&2
            exit 1
          fi
          git update-index --add --cacheinfo "160000,$CANDIDATE_SHA,$SUBMODULE_PATH"
          new_branch_status_file="$RUNNER_TEMP/submodule-update-new-branch-status.z"
          git diff --cached --name-status -z --no-renames "origin/$DEFAULT_BRANCH" > "$new_branch_status_file"
          assert_exact_submodule_path "$new_branch_status_file"
          git diff --cached --check
          git diff-index --check "origin/$DEFAULT_BRANCH" --
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "$PR_TITLE"
          git push origin "$UPDATE_BRANCH"
          gh pr create \
            --draft \
            --base "$DEFAULT_BRANCH" \
            --head "$UPDATE_BRANCH" \
            --title "$PR_TITLE" \
            --body-file "$pr_body"
