name: test-traefik

on:
  push:
  pull_request:

jobs:
  traefik-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Traefik scaffold
        run: |
          set -eu
          test -f connectors/traefik/README.md
          test -f connectors/traefik/TODO.md
          test -f connectors/traefik/docs/architecture.md
          test -f connectors/traefik/docs/build.md
          test -f connectors/traefik/docs/public-sources.md
          test -f tests/traefik/README.md
          grep -q 'Status:' connectors/traefik/TODO.md
      - name: Compile Python skeletons
        run: |
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py
