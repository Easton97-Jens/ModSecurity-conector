name: test-haproxy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  haproxy-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Check HAProxy scaffold
        run: |
          set -eu
          test -f connectors/haproxy/README.md
          test -f connectors/haproxy/TODO.md
          test -f docs/connectors/haproxy.md
          grep -q 'Status:' connectors/haproxy/TODO.md
