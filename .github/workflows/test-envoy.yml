name: test-envoy

on:
  push:
  pull_request:

jobs:
  envoy-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Envoy scaffold
        run: |
          set -eu
          test -f connectors/envoy/README.md
          test -f connectors/envoy/TODO.md
          test -f connectors/envoy/docs/architecture.md
          test -f connectors/envoy/docs/build.md
          test -f connectors/envoy/docs/public-sources.md
          test -f tests/envoy/README.md
          grep -q 'Status:' connectors/envoy/TODO.md
      - name: Compile Python skeletons
        run: |
          python -m py_compile tests/normalizers/*.py tests/runners/*.py
