name: test-envoy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  envoy-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Check Envoy Common and host contracts
        run: |
          set -eu
          make check-envoy-common-adoption
          make check-remaining-connectors-host-integration
          make check-remaining-connectors-build-wiring
          make check-remaining-connectors-start-wiring
          make check-remaining-connectors-claim-policy
