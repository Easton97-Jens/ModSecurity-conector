name: lint

on:
  push:
  pull_request:

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check common boundary and docs
        run: |
          set -eu
          if grep -RInE 'apache|nginx|haproxy|envoy|lighttpd|traefik' common/include common/src; then
            echo "common/include and common/src must remain connector-neutral"
            exit 1
          fi
          test -f README.md
          test -f docs/architecture/architecture.md
          test -f modules/ModSecurity-test-Framework/docs/imports/sources.md
          test -f modules/ModSecurity-test-Framework/docs/testing/compatibility.md
          test -f docs/roadmap/roadmap.md
          test -f docs/README.md
          test -f docs/architecture/README.md
          test -f docs/connectors/README.md
          test -f reports/testing/test-coverage-overview.md
          test ! -d docs/testing
      - name: Run lightweight lint
        run: |
          make setup-dev
          make lint
