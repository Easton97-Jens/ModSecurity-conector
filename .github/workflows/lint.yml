name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Initialize runner temp paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "SOURCE_ROOT=$verified_root/src"
            echo "BUILD_ROOT=$verified_root/build"
            echo "TMP_ROOT=$verified_root/tmp"
            echo "LOG_ROOT=$verified_root/logs"
            echo "CONNECTOR_COMPONENT_CACHE=$verified_root/component-cache"
            echo "NGINX_HARNESS_PARENT=$verified_root/nginx-harness"
          } >> "$GITHUB_ENV"
      - name: Check common boundary and docs
        run: |
          set -eu
          if grep -RInE 'apache|nginx|haproxy|envoy|lighttpd|traefik' common/include common/src; then
            echo "common/include and common/src must remain connector-neutral"
            exit 1
          fi
          test -f README.md
          test -f docs/architecture.md
          test -f modules/ModSecurity-test-Framework/docs/connector-integration.md
          test -f modules/ModSecurity-test-Framework/docs/testing-and-evidence.md
          test -f docs/operations-and-security.md
          test -f docs/README.md
          test -f docs/connectors/README.md
          test -f docs/testing-and-evidence.md
          test -f reports/testing/test-coverage-overview.md
      - name: Check bilingual documentation
        run: python ci/checks/documentation/check-bilingual-docs.py
      - name: Run lightweight lint
        if: github.event_name != 'pull_request'
        run: |
          make setup-dev
          make lint
