name: lint

on:
  push:
  pull_request:

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check common boundary
        run: |
          set -eu
          if grep -RInE 'apache|nginx|haproxy|envoy|lighttpd|traefik' common/include common/src; then
            echo "common/include and common/src must remain connector-neutral"
            exit 1
          fi
      - name: Compile Python skeletons
        run: |
          python -m py_compile tests/normalizers/*.py tests/runners/*.py
      - name: Check required docs
        run: |
          set -eu
          test -f README.md
          test -f docs/architecture.md
          test -f docs/sources.md
          test -f docs/compatibility.md
          test -f docs/roadmap.md
          test -f docs/v2-vs-v3-compatibility.md
