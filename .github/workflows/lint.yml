name: lint

on:
  push:
  pull_request:

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check common boundary
        run: |
          set -eu
          if grep -RInE 'apache|nginx|haproxy|envoy|lighttpd|traefik' common/include common/src; then
            echo "common/include and common/src must remain connector-neutral"
            exit 1
          fi
      - name: Compile Python skeletons
        run: |
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py ci/*.py
      - name: Check required docs
        run: |
          set -eu
          test -f README.md
          test -f docs/architecture/architecture.md
          test -f docs/imports/sources.md
          test -f docs/testing/compatibility.md
          test -f docs/roadmap/roadmap.md
          test -f docs/testing/v2-vs-v3-compatibility.md
          test -f docs/README.md
          test -f docs/architecture/README.md
          test -f docs/connectors/README.md
          test -f docs/testing/README.md
      - name: Check documentation links
        run: |
          python3 ci/check-doc-links.py
