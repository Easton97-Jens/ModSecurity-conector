name: Security workflow lint

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Fetch checksum-verified actionlint
        run: python3 ci/tools/fetch_security_tool.py --tool actionlint --destination "$RUNNER_TEMP/security-tools"
      - name: Lint workflows with ShellCheck when present
        run: |
          set -eu
          mapfile -d '' workflows < <(find .github/workflows ci/fixtures/workflow-permission-contract -type f \( -name '*.yml' -o -name '*.yaml' \) -print0)
          test "${#workflows[@]}" -gt 0
          if command -v shellcheck >/dev/null 2>&1; then
            "$RUNNER_TEMP/security-tools/actionlint" -shellcheck="$(command -v shellcheck)" "${workflows[@]}"
          else
            "$RUNNER_TEMP/security-tools/actionlint" "${workflows[@]}"
          fi
      - name: Validate CI-security workflow contracts
        run: python3 -m unittest -v tests.test_ci_security_workflows

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up toolchain
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false
      - name: Verify Python interpreter contract
        env:
          EXPECTED_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: python3 ci/checks/common/check-python-interpreter-contract.py --version-file .python-version --expected-python "$EXPECTED_PYTHON"
      - name: Fetch checksum-verified zizmor
        run: python3 ci/tools/fetch_security_tool.py --tool zizmor --destination "$RUNNER_TEMP/security-tools"
      - name: Analyze workflows offline
        run: |
          "$RUNNER_TEMP/security-tools/zizmor" --offline .github/workflows
      - name: Require insecure fixture rejection
        run: |
          if "$RUNNER_TEMP/security-tools/zizmor" --offline ci/fixtures/zizmor/insecure.yml; then
            echo 'Expected zizmor to reject the insecure fixture.'
            exit 1
          fi
      - name: Require safe fixture acceptance
        run: |
          "$RUNNER_TEMP/security-tools/zizmor" --offline ci/fixtures/zizmor/safe.yml
      - name: Require workflow-permission unsafe fixture rejection
        run: |
          if "$RUNNER_TEMP/security-tools/zizmor" --offline ci/fixtures/workflow-permission-contract/unsafe.yml; then
            echo 'Expected zizmor to reject the unsafe workflow-permission fixture.'
            exit 1
          fi
      - name: Require workflow-permission safe fixture acceptance
        run: |
          "$RUNNER_TEMP/security-tools/zizmor" --offline ci/fixtures/workflow-permission-contract/safe.yml
