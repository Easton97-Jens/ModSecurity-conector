name: quick-framework-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quick-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_ROOT: ${{ runner.temp }}/sources
      BUILD_ROOT: ${{ runner.temp }}/ModSecurity-conector-build
      TMP_ROOT: ${{ runner.temp }}/ModSecurity-conector-build/tmp
      LOG_ROOT: ${{ runner.temp }}/ModSecurity-conector-build/logs
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Lightweight connector/framework checks
        run: |
          make setup-dev
          make generate-test-matrix
          make check-test-matrix
          make quick-check
          git diff --check
