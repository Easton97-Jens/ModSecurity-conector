name: quick-framework-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quick-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Initialize runner temp paths
        run: |
          set -eu
          {
            echo "SOURCE_ROOT=$RUNNER_TEMP/sources"
            echo "BUILD_ROOT=$RUNNER_TEMP/ModSecurity-conector-build"
            echo "TMP_ROOT=$RUNNER_TEMP/ModSecurity-conector-build/tmp"
            echo "LOG_ROOT=$RUNNER_TEMP/ModSecurity-conector-build/logs"
          } >> "$GITHUB_ENV"
      - name: Lightweight connector/framework checks
        run: |
          make setup-dev
          make generate-test-matrix
          make check-test-matrix
          make quick-check
          git diff --check
