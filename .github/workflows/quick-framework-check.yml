name: quick-framework-check

on:
  push:
  pull_request:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Checkout test framework
        uses: actions/checkout@v4
        with:
          repository: Easton97-Jens/ModSecurity-test-Framework
          path: ModSecurity-test-Framework
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Lightweight framework and generated-doc checks
        env:
          FRAMEWORK_ROOT: ${{ github.workspace }}/ModSecurity-test-Framework
        run: |
          make setup-dev
          make generate-test-matrix
          make check-test-matrix
          make quick-check
          .venv/bin/python -m py_compile "$FRAMEWORK_ROOT"/tests/normalizers/*.py "$FRAMEWORK_ROOT"/tests/runners/*.py "$FRAMEWORK_ROOT"/ci/*.py ci/*.py
          git diff --check
